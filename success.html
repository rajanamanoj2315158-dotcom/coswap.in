<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://unpkg.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success – CoSwap</title>

    <style>
        body {
            background: radial-gradient(circle at center, #1e223a, #0f1120, #06070d, #000);
            color: white;
            font-family: Poppins, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            width: 400px;
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            opacity: 0.85;
        }

        .btn {
            margin-top: 20px;
            padding: 14px 30px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #4fd0ff, #6f6cff);
            color: white;
            cursor: pointer;
            font-size: 17px;
        }
    </style>
    <link rel="preload" href="theme.css" as="style">
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script>
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://coswap.in/">
    <meta property="og:title" content="CoSwap – Buy and Sell Coupons Instantly">
    <meta property="og:description" content="Discover unused coupons from other users or sell your own in seconds.">
    <meta property="og:image" content="https://coswap.in/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://coswap.in/">
    <meta property="twitter:title" content="CoSwap – Buy and Sell Coupons Instantly">
    <meta property="twitter:description" content="Discover unused coupons from other users or sell your own in seconds.">
    <meta property="twitter:image" content="https://coswap.in/logo.png">

</head>

<body>

    <div class="card">
        <h1>Success 🎉</h1>
        <p>Your action was completed successfully.</p>
        <button class="btn" onclick="goHome()">Back to Dashboard</button>
    </div>

    <script>
        function goHome() {
            window.location.href = "dashboard.html";
        }
    </script>

    <script src="components.js" defer></script>
</body>

</html>
