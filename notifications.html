<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://unpkg.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — CoSwap</title>
    <meta name="description" content="View your latest notifications and updates on CoSwap.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://coswap.in/notifications.html">
    <meta property="og:title" content="Notifications — CoSwap">
    <meta property="og:description" content="View your latest notifications and updates on CoSwap.">
    <meta property="og:image" content="https://coswap.in/logo.png">
    <meta property="og:url" content="https://coswap.in/notifications.html">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #141828, #0b0f1e, #05060a);
            color: white;
            padding: 30px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .notif-card {
            background: rgba(255, 255, 255, 0.09);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 14px;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .notif-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 18px rgba(0, 0, 0, 0.4);
        }

        .msg {
            font-size: 15px;
            opacity: 0.9;
        }

        .time {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #4fd0ff, #6f6cff);
            color: white;
            font-weight: 600;
        }
    </style>

    <link rel="preload" href="theme.css" as="style">
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script></head>

<body>

    <h1>Notifications</h1>

    <div id="notifList"></div>

    <script src="api.js" defer></script>
    <script>
        if (!requireAuth("notifications.html")) {
            // redirected
        }

        function formatTime(ts) {
            if (!ts) return "";
            return new Date(ts).toLocaleString();
        }

        async function loadNotifs() {
            let box = document.getElementById("notifList");
            box.innerHTML = "<p>Loading...</p>";

            try {
                const data = await apiRequest("/me/notifications");
                const notifications = data.notifications || [];

                if (notifications.length === 0) {
                    box.innerHTML = "<p>No notifications yet.</p>";
                    return;
                }

                box.innerHTML = "";
                notifications.forEach(n => {
                    box.innerHTML += `
                        <div class="notif-card">
                            <div>
                                <p class="msg">${escapeHtml(n.message)}</p>
                                <p class="time">${formatTime(n.created_at)}</p>
                            </div>
                            <button class="btn" onclick="openNotif(${n.id}, '${n.action || "dashboard.html"}')">Open</button>
                        </div>
                    `;
                });
            } catch (err) {
                box.innerHTML = `<p>Failed to load notifications. ${err.message || ""}</p>`;
            }
        }

        async function openNotif(id, action) {
            await apiRequest(`/me/notifications/${id}/read`, { method: "POST" });
            window.location.href = action;
        }

        loadNotifs();
    </script>

    <script src="components.js" defer></script>
</body>

</html>
