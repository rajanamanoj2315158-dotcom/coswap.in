<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — CoSwap</title>
    <link rel="stylesheet" href="theme.css">
    <script src="api.js"></script>
    <script src="ui.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: white; 
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px; height: 100vh; position: fixed; left: 0; top: 0;
            background: rgba(11, 15, 29, 0.8); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08); padding: 32px 24px;
            display: flex; flex-direction: column; z-index: 1000; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; text-decoration: none; color: white; }
        .logo-area img { width: 32px; height: 32px; }
        .logo-area span { font-size: 20px; font-weight: 800; }

        .nav-links { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px;
            color: rgba(255, 255, 255, 0.5); text-decoration: none; font-size: 14px; font-weight: 600;
        }
        .nav-link.active { background: rgba(79, 208, 255, 0.1); color: #4fd0ff; }

        /* Split View Layout */
        .wrapper { margin-left: 280px; display: flex; height: 100vh; width: calc(100% - 280px); }
        
        /* Left: Chat List */
        .chat-list-pane {
            width: 380px; border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; flex-direction: column; background: rgba(255,255,255,0.01);
        }
        .pane-header { padding: 32px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .pane-header h1 { font-size: 24px; font-weight: 800; }

        .chat-list-scroll { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-card {
            display: flex; gap: 16px; padding: 16px; border-radius: 16px; border: 1px solid transparent;
            cursor: pointer; transition: 0.2s; margin-bottom: 4px;
        }
        .chat-card:hover { background: rgba(255, 255, 255, 0.03); }
        .chat-card.active { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); }
        
        .chat-avatar {
            width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, #4fd0ff, #6f6cff);
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-info .listing { font-size: 12px; color: #4fd0ff; margin-bottom: 4px; display: block; }
        .chat-info p { font-size: 13px; color: rgba(255, 255, 255, 0.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Right: Message Window */
        .message-window { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .window-header { 
            padding: 16px 32px; border-bottom: 1px solid rgba(255,255,255,0.08); 
            display: flex; align-items: center; gap: 16px; min-height: 80px;
        }
        .empty-window { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: rgba(255,255,255,0.3); text-align: center; padding: 40px;
        }

        /* Mobile Adjustments */
        .mobile-header {
            display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 900;
            background: rgba(11, 15, 29, 0.95); backdrop-filter: blur(20px);
            padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            align-items: center; justify-content: space-between;
        }
        .hamburger { background: none; border: none; color: white; cursor: pointer; }

        @media (max-width: 1024px) {
            .chat-list-pane { width: 320px; }
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .wrapper { margin-left: 0; width: 100%; padding-top: 60px; }
            .chat-list-pane { width: 100%; display: block; }
            .message-window { display: none; position: fixed; inset: 0; z-index: 1100; padding-top: 60px; }
            .message-window.active { display: flex; }
            .mobile-header { display: flex; }
            .window-header { padding: 12px 20px; }
        }
    </style>
</head>
<body class="soft-bg">
    <div class="premium-bg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="mist-container"></div>
    </div>

    <header class="mobile-header">
        <button class="hamburger" id="menuToggle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <span style="font-weight: 800;">Messages</span>
        <div id="closeChatMobile" style="display:none; cursor:pointer;" onclick="closeChat()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
        <div style="width:24px;" id="placeholderMenu"></div>
    </header>

    <aside class="sidebar" id="sidebar">
        <a href="dashboard.html" class="logo-area">
            <img src="logo.png" alt="CoSwap">
            <span>CoSwap</span>
        </a>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="browse.html" class="nav-link">Browse Coupons</a>
            <a href="sell.html" class="nav-link">Sell Coupon</a>
            <a href="mylistings.html" class="nav-link">My Listings</a>
            <a href="mypurchases.html" class="nav-link">My Purchases</a>
            <a href="sellerprofile.html" class="nav-link">My Profile</a>
            <a href="requests.html" class="nav-link">Requests</a>
            <a href="chatlist.html" class="nav-link active">Chat</a>
        </nav>
    </aside>

    <div class="wrapper" id="mainWrapper">
        <aside class="chat-list-pane">
            <div class="pane-header">
                <h1>Messages</h1>
            </div>
            <div class="chat-list-scroll" id="chatList">
                <!-- Chats load here -->
            </div>
        </aside>

        <main class="message-window" id="messageWindow">
            <!-- Iframe for the actual chat.html window to handle real-time logic -->
            <div class="empty-window" id="emptyState">
                <div style="font-size: 48px; margin-bottom: 24px;">💬</div>
                <h3 style="color:white; margin-bottom:8px;">Your Conversations</h3>
                <p>Select a message from the list to start chatting.</p>
                <a href="browse.html" class="btn-primary" style="margin-top:24px; padding: 12px 24px; text-decoration:none; border-radius:12px; display:inline-block; background:white; color:black; font-weight:700;">Browse Listings</a>
            </div>
            <iframe id="chatIframe" style="width:100%; height:100%; border:none; display:none;"></iframe>
        </main>
    </div>

    <script>
        if (!requireAuth("chatlist.html")) {}

        // Menu Logic
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        menuToggle.addEventListener('click', () => sidebar.classList.toggle('active'));

        async function loadConversations() {
            const listEl = document.getElementById("chatList");
            try {
                const data = await apiRequest("/chats");
                const chats = data.chats || [];

                if (chats.length === 0) {
                    listEl.innerHTML = `<div style="padding:40px; text-align:center; opacity:0.4;">No conversations yet.</div>`;
                    return;
                }

                listEl.innerHTML = chats.map(c => `
                    <div class="chat-card" onclick="openChat('${c.id}', this)" data-id="${c.id}">
                        <div class="chat-avatar">${(c.other_user_name || "?")[0].toUpperCase()}</div>
                        <div class="chat-info">
                            <h3>${c.other_user_name}</h3>
                            <span class="listing">${c.coupon_title}</span>
                            <p>${c.last_message || "No messages yet"}</p>
                        </div>
                    </div>
                `).join("");

                // If URL has ID, open it
                const params = new URLSearchParams(window.location.search);
                const activeId = params.get("id");
                if (activeId) {
                    const card = [...document.querySelectorAll('.chat-card')].find(el => el.dataset.id === activeId);
                    if (card) openChat(activeId, card);
                }

            } catch (err) {
                listEl.innerHTML = `<div style="padding:24px; color:red;">Error loading chats</div>`;
            }
        }

        function openChat(id, el) {
            document.querySelectorAll('.chat-card').forEach(c => c.classList.remove('active'));
            if (el) el.classList.add('active');

            const iframe = document.getElementById("chatIframe");
            const empty = document.getElementById("emptyState");
            const window = document.getElementById("messageWindow");

            iframe.src = `chat.html?id=${id}&embed=true`;
            iframe.style.display = "block";
            empty.style.display = "none";
            
            // Mobile specific
            if (innerWidth <= 768) {
                window.classList.add("active");
                document.getElementById("closeChatMobile").style.display = "block";
                document.getElementById("placeholderMenu").style.display = "none";
            }
        }

        function closeChat() {
            document.getElementById("messageWindow").classList.remove("active");
            document.getElementById("closeChatMobile").style.display = "none";
            document.getElementById("placeholderMenu").style.display = "block";
        }

        loadConversations();
    </script>
</body>
</html>
