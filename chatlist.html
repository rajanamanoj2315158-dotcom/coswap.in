<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chats – CoSwap</title>

    <style>
        body {
            margin: 0;
            padding: 25px;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #0c0f1d 0%, #14182b 50%, #0b0d18 100%);
            color: white;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 700;
        }

        .chat-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
            display: flex;
            gap: 16px;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(8px);
        }

        .chat-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.08);
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(79, 208, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
            border: 1px solid rgba(79, 208, 255, 0.45);
        }

        .chat-info {
            flex: 1;
        }

        .name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .last-msg {
            font-size: 13px;
            opacity: 0.75;
        }

        .status {
            margin-top: 6px;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 8px;
            width: fit-content;
        }

        .pending {
            background: rgba(255, 210, 0, 0.18);
            color: #ffd200;
        }

        .active {
            background: rgba(0, 255, 150, 0.18);
            color: #00ff9d;
        }

        .expired {
            background: rgba(255, 80, 80, 0.18);
            color: #ff4e4e;
        }

        .completed {
            background: rgba(79, 208, 255, 0.18);
            color: #4fd0ff;
        }
    </style>
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script></head>

<body>

    <h1>Your Chats</h1>

    <div id="chatList"></div>

    <script src="api.js"></script>
    <script>
        if (!requireAuth("chatlist.html")) {
            // redirected
        }

        let chats = [];

        async function loadChats() {
            let list = document.getElementById("chatList");
            list.innerHTML = "<p style='opacity:0.7;'>Loading chats...</p>";

            try {
                const data = await apiRequest("/chats");
                chats = data.chats || [];

                if (chats.length === 0) {
                    list.innerHTML = "<p style='opacity:0.7;'>No chats yet.</p>";
                    return;
                }

                const me = getCurrentUser();
                list.innerHTML = "";

                chats.forEach(chat => {
                    const other =
                        chat.buyer_id === me.id ? chat.seller_name : chat.buyer_name;
                    const initial = (other || "U").charAt(0).toUpperCase();
                    const statusClass = chat.status || "active";

                    list.innerHTML += `
                        <div class="chat-card" onclick="openChat('${chat.id}')">
                            <div class="avatar">${initial}</div>
                            <div class="chat-info">
                                <div class="name">${other} – ${chat.coupon_title}</div>
                                <div class="last-msg">${chat.last_message || "No messages yet"}</div>
                                <div class="status ${statusClass}">${(chat.status || "active").toUpperCase()}</div>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                list.innerHTML = `<p style='opacity:0.7;'>Failed to load chats. ${err.message || ""}</p>`;
            }
        }

        function openChat(id) {
            window.location.href = `chat.html?id=${id}`;
        }

        loadChats();
    </script>

</body>

</html>
