<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — CoSwap</title>
    <link rel="canonical" href="https://coswap.in/chatlist.html">
    <link rel="stylesheet" href="theme.css">
    <script src="api.js"></script>
    <script src="ui.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: white; 
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px; height: 100vh; position: fixed; left: 0; top: 0;
            background: rgba(11, 15, 29, 0.8); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08); padding: 32px 24px;
            display: flex; flex-direction: column; z-index: 1000; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; text-decoration: none; color: white; }
        .logo-area img { width: 32px; height: 32px; }
        .logo-area span { font-size: 20px; font-weight: 800; }

        .nav-links { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px;
            color: rgba(255, 255, 255, 0.5); text-decoration: none; font-size: 14px; font-weight: 600;
        }
        .nav-link.active { background: rgba(79, 208, 255, 0.1); color: #4fd0ff; }

        /* Split View Layout */
        .wrapper { margin-left: 280px; display: flex; height: 100vh; width: calc(100% - 280px); }
        
        /* Left: Chat List */
        .chat-list-pane {
            width: 380px; border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; flex-direction: column; background: rgba(255,255,255,0.01);
        }
        .pane-header { padding: 32px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .pane-header h1 { font-size: 24px; font-weight: 800; }

        .chat-list-scroll { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-card {
            display: flex; gap: 16px; padding: 16px; border-radius: 16px; border: 1px solid transparent;
            cursor: pointer; transition: 0.2s; margin-bottom: 4px;
        }
        .chat-card:hover { background: rgba(255, 255, 255, 0.03); }
        .chat-card.active { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); }
        
        .chat-avatar {
            width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, #4fd0ff, #6f6cff);
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-info .listing { font-size: 12px; color: #4fd0ff; margin-bottom: 4px; display: block; }
        .chat-info p { font-size: 13px; color: rgba(255, 255, 255, 0.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Right: Message Window */
        .message-window { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .window-header { 
            padding: 16px 32px; border-bottom: 1px solid rgba(255,255,255,0.08); 
            display: flex; align-items: center; gap: 16px; min-height: 80px;
        }
        .empty-window { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: rgba(255,255,255,0.3); text-align: center; padding: 40px;
        }

        /* Mobile Adjustments */
        .mobile-header {
            display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 900;
            background: rgba(11, 15, 29, 0.95); backdrop-filter: blur(20px);
            padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            align-items: center; justify-content: space-between;
        }
        .hamburger { background: none; border: none; color: white; cursor: pointer; }

        @media (max-width: 1024px) {
            .chat-list-pane { width: 320px; }
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .wrapper { margin-left: 0; width: 100%; padding-top: 60px; }
            .chat-list-pane { width: 100%; display: block; }
            .message-window { display: none; position: fixed; inset: 0; z-index: 1100; padding-top: 60px; }
            .message-window.active { display: flex; }
            .mobile-header { display: flex; }
            .window-header { padding: 12px 20px; }
        }
    </style>
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="soft-bg">
    <nav class="navbar">
        <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: white;">
            <img src="logo.png" alt="CoSwap" style="width: 32px; height: 32px;">
            <span style="font-size: 20px; font-weight: 800; letter-spacing: -0.04em;">CoSwap</span>
        </a>
        
        <div class="nav-menu">
            <a href="browse.html" class="nav-link">Browse</a>
            <a href="sell.html" class="nav-link">Sell</a>
            <a href="dashboard.html" class="nav-link">My Listings</a>
            <a href="chatlist.html" class="nav-link active">Messages</a>
            <a href="profile.html" class="nav-link">Profile</a>
        </div>

        <div class="nav-right">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=coswap" alt="Avatar" class="user-avatar" onclick="window.location.href='profile.html'">
            <i data-lucide="log-out" class="logout-icon" onclick="handleLogout()" style="width: 20px;"></i>
        </div>
    </nav>

    <main class="container" style="padding: 40px 24px; height: calc(100vh - 72px); display: flex; flex-direction: column;">
        <header style="margin-bottom: 24px;">
            <h1 class="heading-elite">Messages</h1>
            <p class="subtext-elite">Chat with buyers and sellers in real-time.</p>
        </header>

        <div class="card" style="flex: 1; display: grid; grid-template-columns: 350px 1fr; overflow: hidden; padding: 0;">
            <!-- Left Side: Thread List -->
            <div style="border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; background: rgba(255,255,255,0.01);">
                <div style="padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 700; font-size: 14px; text-transform: uppercase; color: rgba(255,255,255,0.4);">Recent Converstations</div>
                <div id="threadList" style="flex: 1; overflow-y: auto;">
                    <div style="padding: 24px; text-align: center; opacity: 0.5;">Loading...</div>
                </div>
            </div>

            <!-- Right Side: Active Chat -->
            <div id="activeChat" style="display: flex; flex-direction: column; background: rgba(0,0,0,0.2);">
                <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.2); flex-direction: column; gap: 16px;">
                    <i data-lucide="message-square" style="width: 48px; height: 48px; opacity: 0.1;"></i>
                    <p>Select a conversation to start chatting</p>
                </div>
            </div>
        </div>
    </main>

    <style>
        .thread-item {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.2s;
        }
        .thread-item:hover { background: rgba(255,255,255,0.03); }
        .thread-item.active { background: rgba(79, 208, 255, 0.05); border-left: 3px solid #38bdf8; }
        
        .chat-header-elite {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.3);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }
        .msg.sent {
            align-self: flex-end;
            background: #38bdf8;
            color: #020617;
            font-weight: 500;
            border-bottom-right-radius: 2px;
        }
        .msg.received {
            align-self: flex-start;
            background: rgba(255,255,255,0.08);
            color: white;
            border-bottom-left-radius: 2px;
        }
        
        .chat-input-elite {
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 12px;
        }
        .chat-input-elite input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
        }
        .chat-input-elite input:focus { border-color: #38bdf8; }
    </style>

    <script>
        let currentChatId = null;
        let pollInterval = null;

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof requireAuth === 'function' && !requireAuth()) return;
            loadThreads();
            lucide.createIcons();
        });

        async function loadThreads() {
            const list = document.getElementById("threadList");
            try {
                const data = await apiRequest("/chats");
                const threads = data.chats || [];
                
                if (threads.length === 0) {
                    list.innerHTML = `<div style="padding: 40px; text-align: center; opacity: 0.3;">No messages yet.</div>`;
                    return;
                }

                list.innerHTML = threads.map(t => `
                    <div class="thread-item ${currentChatId == t.id ? 'active' : ''}" onclick="selectChat(${t.id}, '${t.other_user_name}', '${escapeHtml(t.coupon_title)}')">
                        <div style="font-weight: 700; font-size: 15px; margin-bottom: 4px; color: ${currentChatId == t.id ? '#38bdf8' : 'white'}">${t.other_user_name}</div>
                        <div style="font-size: 12px; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(t.coupon_title)}</div>
                    </div>
                `).join("");
            } catch (err) {
                list.innerHTML = `<div style="padding: 24px; text-align: center; color: #ff4d4d;">Failed to load.</div>`;
            }
        }

        async function selectChat(id, name, title) {
            currentChatId = id;
            loadThreads(); // Update active state
            
            const activeChat = document.getElementById("activeChat");
            activeChat.innerHTML = `
                <div class="chat-header-elite">
                    <div>
                        <div style="font-weight: 800; font-size: 16px;">${name}</div>
                        <div style="font-size: 12px; color: #38bdf8; font-weight: 600;">${title}</div>
                    </div>
                </div>
                <div id="messages"></div>
                <form class="chat-input-elite" onsubmit="handleSendMessage(event)">
                    <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" class="button-primary" style="padding: 0 20px; height: 44px; font-size: 14px;">Send</button>
                </form>
            `;
            
            lucide.createIcons();
            fetchMessages();
            
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(fetchMessages, 3000);
        }

        async function fetchMessages() {
            if (!currentChatId) return;
            try {
                const data = await apiRequest(`/chats/${currentChatId}`);
                renderMessages(data.messages);
            } catch (err) {}
        }

        function renderMessages(msgs) {
            const box = document.getElementById("messages");
            if (!box) return;
            const currentUserId = getCurrentUser()?.id;
            
            const html = msgs.map(m => `
                <div class="msg ${m.sender_id == currentUserId ? 'sent' : 'received'}">
                    ${m.content}
                </div>
            `).join("");
            
            const wasAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 50;
            box.innerHTML = html;
            if (wasAtBottom) box.scrollTop = box.scrollHeight;
        }

        async function handleSendMessage(e) {
            e.preventDefault();
            const input = document.getElementById("messageInput");
            const content = input.value.trim();
            if (!content || !currentChatId) return;

            input.value = "";
            try {
                await apiRequest(`/chats/${currentChatId}/messages`, {
                    method: "POST",
                    body: JSON.stringify({ content })
                });
                fetchMessages();
            } catch (err) {
                alert("Failed to send: " + err.message);
            }
        }

        function handleLogout() {
            if (confirm("Sign out from CoSwap?")) {
                if (typeof clearAuth === 'function') clearAuth();
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
