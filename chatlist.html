<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — CoSwap</title>
    <link rel="stylesheet" href="theme.css">
    <script src="api.js"></script>
    <script src="ui.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: white; 
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px; height: 100vh; position: fixed; left: 0; top: 0;
            background: rgba(11, 15, 29, 0.8); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08); padding: 32px 24px;
            display: flex; flex-direction: column; z-index: 1000; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; text-decoration: none; color: white; }
        .logo-area img { width: 32px; height: 32px; }
        .logo-area span { font-size: 20px; font-weight: 800; }

        .nav-links { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px;
            color: rgba(255, 255, 255, 0.5); text-decoration: none; font-size: 14px; font-weight: 600;
        }
        .nav-link.active { background: rgba(79, 208, 255, 0.1); color: #4fd0ff; }

        /* Split View Layout */
        .wrapper { margin-left: 280px; display: flex; height: 100vh; width: calc(100% - 280px); }
        
        /* Left: Chat List */
        .chat-list-pane {
            width: 380px; border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; flex-direction: column; background: rgba(255,255,255,0.01);
        }
        .pane-header { padding: 32px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .pane-header h1 { font-size: 24px; font-weight: 800; }

        .chat-list-scroll { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-card {
            display: flex; gap: 16px; padding: 16px; border-radius: 16px; border: 1px solid transparent;
            cursor: pointer; transition: 0.2s; margin-bottom: 4px;
        }
        .chat-card:hover { background: rgba(255, 255, 255, 0.03); }
        .chat-card.active { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); }
        
        .chat-avatar {
            width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, #4fd0ff, #6f6cff);
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-info .listing { font-size: 12px; color: #4fd0ff; margin-bottom: 4px; display: block; }
        .chat-info p { font-size: 13px; color: rgba(255, 255, 255, 0.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Right: Message Window */
        .message-window { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .window-header { 
            padding: 16px 32px; border-bottom: 1px solid rgba(255,255,255,0.08); 
            display: flex; align-items: center; gap: 16px; min-height: 80px;
        }
        .empty-window { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: rgba(255,255,255,0.3); text-align: center; padding: 40px;
        }

        /* Mobile Adjustments */
        .mobile-header {
            display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 900;
            background: rgba(11, 15, 29, 0.95); backdrop-filter: blur(20px);
            padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            align-items: center; justify-content: space-between;
        }
        .hamburger { background: none; border: none; color: white; cursor: pointer; }

        @media (max-width: 1024px) {
            .chat-list-pane { width: 320px; }
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .wrapper { margin-left: 0; width: 100%; padding-top: 60px; }
            .chat-list-pane { width: 100%; display: block; }
            .message-window { display: none; position: fixed; inset: 0; z-index: 1100; padding-top: 60px; }
            .message-window.active { display: flex; }
            .mobile-header { display: flex; }
            .window-header { padding: 12px 20px; }
        }
    </style>
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="soft-bg">
    <!-- Desktop Nav (Icon Based) -->
    <nav class="nav-wrapper desktop-only" style="background: rgba(15, 19, 36, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); height: 72px; position: sticky; top: 0; z-index: 1000;">
        <div class="content-container" style="display:flex; align-items:center; justify-content:space-between; height: 100%;">
            <a href="dashboard.html" class="brand" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: white;">
                <img src="logo.png" alt="CoSwap" style="width: 32px; height: 32px;">
                <span style="font-size: 20px; font-weight: 800; letter-spacing: -0.02em;">CoSwap</span>
            </a>
            
            <div style="display: flex; gap: 32px; align-items: center;">
                <a href="dashboard.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Dashboard</a>
                <a href="browse.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Browse</a>
                <a href="sell.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Sell</a>
                <a href="mylistings.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">My Listings</a>
            </div>

            <div style="display: flex; gap: 12px; align-items: center;">
                <a href="chatlist.html" class="btn-icon" title="Messages" style="color: #4fd0ff; background: rgba(79, 208, 255, 0.1);"><i data-lucide="message-square"></i></a>
                <a href="profile.html" class="btn-icon" title="Profile"><i data-lucide="user"></i></a>
                <a href="login.html" class="btn-icon" title="Logout" style="color: var(--danger);"><i data-lucide="log-out"></i></a>
            </div>
        </div>
    </nav>

    <!-- Mobile Header -->
    <header class="mobile-header" style="padding: 16px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; background: rgba(15, 19, 36, 0.9); backdrop-filter: blur(20px);">
        <a href="dashboard.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: white;">
            <img src="logo.png" alt="CoSwap" style="width: 28px; height: 28px;">
            <span style="font-weight: 800; font-size: 18px;">CoSwap</span>
        </a>
        <div style="display: flex; gap: 16px; align-items: center;">
            <a href="chatlist.html" style="color: #4fd0ff;"><i data-lucide="message-square"></i></a>
            <a href="profile.html" style="color: white;"><i data-lucide="user"></i></a>
            <button id="menuToggle" style="background: none; border: none; color: white;"><i data-lucide="menu"></i></button>
        </div>
    </header>

    <main class="content-container" style="padding: 40px 24px 80px;">
        <header style="margin-bottom: 32px;">
            <h1 style="font-size: 32px; font-weight: 800; letter-spacing: -0.02em;">Messages</h1>
            <p style="color: rgba(255,255,255,0.5);">Instant communication with your buyers and sellers.</p>
        </header>

        <div class="chat-layout glass-card" style="display: grid; grid-template-columns: 350px 1fr; height: 700px; border-radius: 20px;">
            <!-- Thread List -->
            <div style="border-right: 1px solid rgba(255,255,255,0.08); overflow-y: auto;" id="threadList">
                <div style="padding: 24px; text-align: center; opacity: 0.5;">Loading threads...</div>
            </div>
            
            <!-- Active Conversation -->
            <div style="display: flex; flex-direction: column;" id="activeChat">
                <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); flex-direction: column;">
                    <i data-lucide="message-square" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.2;"></i>
                    <p>Select a conversation to start chatting</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Nav Mobile -->
    <nav class="mobile-nav">
        <div class="mobile-nav-inner">
            <a href="dashboard.html" class="mobile-nav-item"><i data-lucide="layout-dashboard"></i><span>Home</span></a>
            <a href="browse.html" class="mobile-nav-item"><i data-lucide="search"></i><span>Browse</span></a>
            <a href="sell.html" class="mobile-nav-item"><i data-lucide="plus-circle"></i><span>Sell</span></a>
            <a href="chatlist.html" class="mobile-nav-item active"><i data-lucide="message-square"></i><span>Chat</span></a>
        </div>
    </nav>

    <script>
        lucide.createIcons();
        if (!requireAuth("chatlist.html")) {}

        async function loadThreads() {
            const list = document.getElementById("threadList");
             try {
                const data = await apiRequest("/chats");
                const threads = data.chats || [];
                
                if (threads.length === 0) {
                    list.innerHTML = `<div style="padding: 40px; text-align: center; opacity: 0.5;">No messages yet.</div>`;
                    return;
                }

                list.innerHTML = threads.map(t => `
                    <div class="thread-item" onclick="openChat(${t.id})" style="padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s;">
                        <div style="font-weight: 700; margin-bottom: 6px; font-size: 16px;">${t.other_user_name}</div>
                        <div style="font-size: 14px; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${t.last_message || 'No messages yet'}</div>
                    </div>
                `).join("");
            } catch (err) {
                list.innerHTML = `<div style="padding: 40px; text-align: center; color: var(--danger);">Failed to load conversations.</div>`;
            }
        }

        function openChat(id) {
            window.location.href = `chat.html?id=${id}`;
        }

        loadThreads();
    </script>
</body>
</html>
