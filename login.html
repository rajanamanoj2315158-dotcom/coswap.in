<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – CoSwap</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #141828, #0b0f1e, #05060a);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            width: 420px;
            padding: 35px 40px 40px;
            border-radius: 22px;
            background: linear-gradient(155deg, rgba(45, 54, 88, 0.96), rgba(28, 35, 58, 0.95));
            backdrop-filter: blur(18px);
            border: 1px solid rgba(99, 167, 255, 0.28);
            box-shadow: 0 24px 60px rgba(10, 12, 26, 0.65),
                0 0 0 1px rgba(79, 208, 255, 0.08),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.7s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-img {
            width: 75px;
            display: block;
            margin: 0 auto 12px;
        }

        h2 {
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.14);
            color: white;
            font-size: 15px;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.55);
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 2px rgba(79, 208, 255, 0.7);
        }

        .forgot {
            text-align: right;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .forgot a {
            color: #4fd0ff;
            text-decoration: none;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(90deg, #4fd0ff, #7b5bff);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 18px;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .google-btn {
            width: 100%;
            padding: 12px 18px;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            background: #ffffff;
            color: #000;
            font-size: 17px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.22);
            transition: 0.2s ease;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.28);
        }

        .google-logo {
            width: 28px;
            height: 28px;
        }

        .signup-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.85;
        }

        .signup-text a {
            color: #4fd0ff;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        /* Toast */

    </style>
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script></head>

<body class="soft-bg">

    <div class="card">

        <img src="logo.png" class="logo-img">

        <h2>Login</h2>

        <div class="input-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input id="password" type="password" placeholder="Enter your password">
        </div>

        <div class="forgot">
            <a href="forgot.html">Forgot Password?</a>
        </div>

        <button class="btn-login" onclick="loginUser()">Login</button>

        <button class="google-btn">
            <svg class="google-logo" viewBox="0 0 48 48">
                <path fill="#FFC107"
                    d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.9 0-12.5-5.6-12.5-12.5S17.1 11 24 11c3.2 0 6.2 1.2 8.5 3.3l5.7-5.7C34.2 5.1 29.4 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.3-.4-3.5z" />
                <path fill="#FF3D00"
                    d="M6.3 14.7l6.6 4.8C14.4 15.2 18.8 11 24 11c3.2 0 6.2 1.2 8.5 3.3l5.7-5.7C34.2 5.1 29.4 3 24 3 15.1 3 7.6 8.3 6.3 14.7z" />
                <path fill="#4CAF50"
                    d="M24 45c5.3 0 10.1-2 13.8-5.3l-6.4-5.4C29.2 36.8 26.8 38 24 38c-5.3 0-9.7-3.4-11.3-8l-6.6 5C7.6 39.7 15.1 45 24 45z" />
                <path fill="#1976D2"
                    d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.4l6.4 5.4C39.9 35.3 42 30 42 24c0-1.2-.1-2.3-.4-3.5z" />
            </svg>

            Continue with Google
        </button>

        <p class="signup-text">
            New user? <a href="signup.html">Create an account</a>
        </p>

    </div>

    <div id="toast" class="toast"></div>

    <script src="api.js"></script>
    <script>
        (function persistRedirect() {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get("redirect");

            if (!redirect) return;

            const map = {
                sell: "sell.html",
                buy: "buy.html",
                browse: "browse.html",
                dashboard: "dashboard.html"
            };

            const target = map[redirect] || (redirect.endsWith(".html") ? redirect : null);
            if (target) {
                localStorage.setItem("redirectAfterLogin", target);
            }
        })();

        function showToast(message) {
            const el = document.getElementById("toast");
            el.textContent = message;
            el.classList.add("show");
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.remove("show"), 2200);
        }

        function isValidEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        }

        async function loginUser() {
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();

            if (!email || !password) {
                showToast("Please enter both email and password.");
                return;
            }
            if (!isValidEmail(email)) {
                showToast("Please enter a valid email address.");
                return;
            }

            try {
                const data = await apiRequest("/auth/login", {
                    method: "POST",
                    body: JSON.stringify({ email, password })
                });

                setAuth(data.token, data.user);
                showToast("Login Successful!");
                handleRedirect();
            } catch (err) {
                showToast(err.message || "Invalid email or password. Please try again.");
            }
        }

        function handleRedirect() {
            const redirectPage = localStorage.getItem("redirectAfterLogin");

            if (redirectPage) {
                localStorage.removeItem("redirectAfterLogin");
                window.location.href = redirectPage;
            } else {
                window.location.href = "dashboard.html";
            }
        }
    </script>




</body>

</html>
