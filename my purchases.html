<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Purchases – CoSwap</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #141828, #0b0f1e, #05060a);
            color: white;
            padding: 30px;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .purchase-card {
            background: rgba(255, 255, 255, 0.09);
            padding: 22px;
            border-radius: 16px;
            margin-bottom: 20px;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .purchase-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
        }

        .left-box p {
            margin-bottom: 6px;
        }

        .coupon-title {
            font-size: 20px;
            font-weight: 600;
        }

        .price {
            color: #4fd0ff;
            font-size: 18px;
            margin-top: 6px;
            font-weight: 600;
        }

        .expiry {
            font-size: 13px;
            opacity: 0.8;
        }

        .status {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            display: inline-block;
        }

        .active {
            background: rgba(0, 255, 80, 0.2);
            border: 1px solid #00ff80;
        }

        .expired {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid red;
        }

        .dispute {
            background: rgba(255, 210, 80, 0.15);
            border: 1px solid #ffd850;
        }

        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        .view-btn {
            background: linear-gradient(90deg, #4fd0ff, #6f6cff);
            color: white;
        }

        .chat-btn {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .rate-btn {
            background: rgba(255, 210, 80, 0.15);
            border: 1px solid #ffd850;
            color: white;
        }
    </style>

    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script></head>

<body>

    <h1>My Purchases</h1>

    <div id="purchaseList"></div>

    <script>
        // EXAMPLE DATA
        let purchases = [
            {
                title: "Spotify Premium – 1 Month",
                price: 40,
                expiry: "31 Dec 2025",
                status: "active",
                coupon: "coupon.html",
                chat: "chat.html"
            },
            {
                title: "Zomato 50% OFF Coupon",
                price: 25,
                expiry: "Expired",
                status: "expired",
                coupon: "coupon.html",
                chat: "chat.html"
            },
            {
                title: "Hotstar Premium – 30 Days",
                price: 55,
                expiry: "Pending Review",
                status: "dispute",
                coupon: "coupon.html",
                chat: "chat.html"
            }
        ];

        function loadPurchases() {
            let box = document.getElementById("purchaseList");

            purchases.forEach(p => {
                let statusClass =
                    p.status === "active" ? "active" :
                        p.status === "expired" ? "expired" :
                            "dispute";

                let statusText =
                    p.status === "active" ? "Active" :
                        p.status === "expired" ? "Expired" :
                            "Under Review";

                box.innerHTML += `
        <div class="purchase-card">
            <div class="left-box">
                <p class="coupon-title">${p.title}</p>
                <p class="price">₹${p.price}</p>
                <p class="expiry">Expiry: ${p.expiry}</p>
                <span class="status ${statusClass}">${statusText}</span>
            </div>

            <div class="btn-box">
                <button class="btn view-btn" onclick="go('${p.coupon}')">View Coupon</button>
                <button class="btn chat-btn" onclick="go('${p.chat}')">View Chat</button>
                <button class="btn rate-btn" onclick="rateSeller()">Rate Seller</button>
            </div>
        </div>
        `;
            });
        }

        function go(page) {
            window.location.href = page;
        }

        function rateSeller() {
            let rating = prompt("Rate the seller (1–5 stars):");

            if (!rating) return;

            rating = Number(rating);

            if (rating < 1 || rating > 5) {
                alert("Enter a rating between 1 and 5.");
                return;
            }

            alert("Thank you! Your rating has been submitted.");
        }

        loadPurchases();
    </script>

    <script>
        window.location.href = "mypurchases.html";
    </script>

</body>

</html>
