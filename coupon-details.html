<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupon Details – CoSwap</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0d1a, #12152b, #0a0d1a);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: center;
        }

        h1 {
            position: absolute;
            top: 20px;
            font-size: 34px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(110, 130, 255, 0.7);
        }

        .card {
            width: 480px;
            background: rgba(255, 255, 255, 0.07);
            padding: 32px;
            padding-top: 45px;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 0 28px rgba(140, 160, 255, 0.20);
            backdrop-filter: blur(12px);
            margin-top: 90px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* IMAGE SECTION */
        .img-box {
            width: 100%;
            height: 230px;
            margin-bottom: 22px;
            border-radius: 18px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* TITLE */
        #title {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 18px;
            line-height: 1.3;
        }

        /* INFO SECTIONS */
        .section {
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .label {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .value {
            font-size: 17px;
            font-weight: 500;
        }

        /* EXPIRY BADGE */
        .expiry-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff5e5e, #ff8f8f);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
        }

        /* BUTTON */
        .back-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #4fd0ff, #7b5bff);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 0 22px rgba(120, 120, 255, 0.30);
            transition: 0.25s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 28px rgba(140, 140, 255, 0.45);
        }
    </style>
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script></head>

<body>

    <h1>Coupon Details</h1>

    <div class="card">

        <div class="img-box">
            <img id="img">
        </div>

        <h2 id="title">Loading...</h2>

        <div class="section">
            <div class="label">Price</div>
            <div class="value" id="price"></div>
        </div>

        <div class="section">
            <div class="label">Category</div>
            <div class="value" id="category"></div>
        </div>

        <div class="section">
            <div class="label">Description</div>
            <div class="value" id="description"></div>
        </div>

        <div class="section">
            <div class="label">Expiry Date</div>
            <div class="value" id="expiry"></div>
            <div class="expiry-badge" id="expiryBadge"></div>
        </div>

        <div class="section">
            <div class="label">Seller</div>
            <div class="value" id="seller"></div>
        </div>
        <div class="section">
            <div class="label">Seller Stats</div>
            <div class="value" id="sellerStats"></div>
        </div>

        <button class="back-btn" onclick="window.location.href='browse.html'">
            Back to Browse
        </button>
    </div>

    <script src="api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const couponId = params.get("id");

        async function loadCoupon() {
            if (!couponId) {
                alert("No coupon selected.");
                window.location.href = "browse.html";
                return;
            }

            try {
                const data = await apiRequest(`/coupons/${couponId}`);
                const coupon = data.coupon;

                document.getElementById("img").src = coupon.image_url || "bg.png";
                document.getElementById("title").innerText = coupon.title || "No Title";
                document.getElementById("price").innerText = coupon.price ? "₹" + coupon.price : "Not Provided";
                document.getElementById("category").innerText = coupon.category || "Not Specified";
                document.getElementById("description").innerText = coupon.details || "No details available";
                document.getElementById("seller").innerText = coupon.seller_name || "Unknown Seller";
                const ratingText = coupon.seller_rating ? coupon.seller_rating : "Not rated";
                const fraudText = (coupon.seller_fraud_percent ?? 0) + "% fraud";
                const levelText = "Level " + (coupon.seller_level || 1);
                document.getElementById("sellerStats").innerText =
                    `${ratingText} • ${fraudText} • ${levelText}`;

                if (coupon.expiry) {
                    let date = new Date(coupon.expiry);
                    document.getElementById("expiry").innerText = date.toDateString();

                    let today = new Date();
                    let diff = (date - today) / (1000 * 60 * 60 * 24);

                    let badge = document.getElementById("expiryBadge");

                    if (diff < 0) {
                        badge.innerText = "Expired";
                        badge.style.background = "linear-gradient(135deg, #555, #777)";
                    }
                    else if (diff < 3) {
                        badge.innerText = "Expires Soon";
                        badge.style.background = "linear-gradient(135deg, #ffae00, #ff8c00)";
                    }
                    else {
                        badge.innerText = "Valid";
                        badge.style.background = "linear-gradient(135deg, #4fd0ff, #7b5bff)";
                    }
                } else {
                    document.getElementById("expiry").innerText = "Not Provided";
                    document.getElementById("expiryBadge").style.display = "none";
                }
            } catch (err) {
                alert(err.message || "Failed to load coupon.");
                window.location.href = "browse.html";
            }
        }

        loadCoupon();
    </script>

</body>

</html>
