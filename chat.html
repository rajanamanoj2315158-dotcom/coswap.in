<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Chat – CoSwap</title>

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: radial-gradient(circle at center, #141828, #0b0f1e, #05060a);
            color: white;
        }

        .header {
            background: rgba(255, 255, 255, 0.07);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding: 18px;
            font-size: 20px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .chat-area {
            height: calc(100vh - 150px);
            overflow-y: auto;
            padding: 20px;
        }

        /* Chat bubbles */
        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 18px;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.25s ease;
            font-size: 14px;
            line-height: 1.5;
        }

        .left {
            background: rgba(255, 255, 255, 0.10);
            margin-right: auto;
        }

        .right {
            background: rgba(79, 208, 255, 0.18);
            border: 1px solid rgba(79, 208, 255, 0.45);
            margin-left: auto;
            color: #dff7ff;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .time {
            margin-top: 4px;
            font-size: 11px;
            opacity: 0.7;
        }

        /* Input bar */
        .input-bar {
            display: flex;
            gap: 10px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.07);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            align-items: center;
            display: none;
        }

        .input-bar input {
            flex: 1;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 12px;
            color: white;
            outline: none;
            border: none;
            font-size: 14px;
        }

        .icon {
            font-size: 22px;
            cursor: pointer;
            color: #4fd0ff;
            transition: 0.2s;
            border: none;
            background: none;
        }

        .icon:hover {
            transform: scale(1.15);
        }

        .send-btn {
            font-size: 24px;
            background: none;
            border: none;
            color: #4fd0ff;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.25);
        }

        .img-msg {
            width: 170px;
            border-radius: 12px;
            display: block;
            margin-bottom: 5px;
        }

        audio {
            width: 180px;
        }

        /* Confirmation buttons block */
        #confirmArea {
            text-align: center;
            margin: 10px 0;
        }

        .conf-btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            border: none;
            margin: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .yes-btn {
            background: #4fd0ff;
            color: black;
        }

        .no-btn {
            background: #ff4e4e;
            color: white;
        }

        /* Transaction buttons */
        #transactionBtns {
            text-align: center;
            margin: 10px 0;
            display: none;
        }

        .done-btn {
            padding: 10px 18px;
            border-radius: 12px;
            background: #00ff9d;
            color: black;
            border: none;
            font-size: 14px;
            cursor: pointer;
            margin: 6px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }

        .modal-box {
            width: 320px;
            background: #1c1f2e;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: scaleIn 0.25s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(.85);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-buttons button {
            width: 48%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-cancel {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        .modal-ok {
            background: #ff4e4e;
            color: white;
        }
    </style>
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script></head>

<body>

    <div class="header" id="chatTitle">Chat</div>

    <div id="confirmArea"></div>

    <div class="chat-area" id="chatBox"></div>

    <div id="transactionBtns">
        <button class="done-btn" onclick="buyerDoneFunc()">Buyer: Transaction Done</button>
        <button class="done-btn" onclick="sellerDoneFunc()" style="background:#4fd0ff;">Seller: Transaction
            Done</button>
    </div>

    <!-- Input bar -->
    <div class="input-bar" id="inputBar">
        <input id="msgInput" placeholder="Type message...">

        <input type="file" id="fileInput" style="display:none;" accept="image/*,.pdf" onchange="sendFile(event)">
        <button class="icon" onclick="document.getElementById('fileInput').click()">📎</button>

        <button class="icon" id="micBtn" onclick="toggleMic()">🎤</button>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modalTitle">Title</h2>
            <p id="modalMsg">Message</p>
            <div class="modal-buttons">
                <button class="modal-cancel" onclick="closeModal()">Close</button>
                <button class="modal-ok" id="modalOK" style="display:none;">OK</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        if (!requireAuth()) {
            // redirected
        }

        const params = new URLSearchParams(window.location.search);
        const chatId = params.get("id");

        let chat = null;
        let messages = [];

        const chatTitle = document.getElementById("chatTitle");
        const chatBox = document.getElementById("chatBox");
        const inputBar = document.getElementById("inputBar");
        const confirmArea = document.getElementById("confirmArea");
        const transactionBtns = document.getElementById("transactionBtns");

        confirmArea.innerHTML = "";
        transactionBtns.style.display = "none";

        async function loadChat() {
            if (!chatId) {
                alert("Chat not found.");
                window.location.href = "chatlist.html";
                return;
            }

            try {
                const [chatData, msgData] = await Promise.all([
                    apiRequest(`/chats/${chatId}`),
                    apiRequest(`/chats/${chatId}/messages`)
                ]);

                chat = chatData.chat;
                messages = msgData.messages || [];

                const me = getCurrentUser();
                const other = chat.buyer_id === me.id ? chat.seller_name : chat.buyer_name;
                chatTitle.innerText = `${other} – ${chat.coupon_title}`;

                renderMessages();
                inputBar.style.display = "flex";
            } catch (err) {
                alert(err.message || "Failed to load chat.");
                window.location.href = "chatlist.html";
            }
        }

        function renderMessages() {
            chatBox.innerHTML = "";
            const me = getCurrentUser();

            messages.forEach(msg => {
                const side = msg.sender_id === me.id ? "right" : "left";
                const time = formatTime(msg.created_at);

                chatBox.innerHTML += `
                    <div class="bubble ${side}">
                        ${msg.body}
                        <div class="time">${time}</div>
                    </div>
                `;
            });

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function formatTime(ts) {
            if (!ts) return "";
            return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(str) {
            if (!str) return "";
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        async function sendRawMessage(body) {
            const data = await apiRequest(`/chats/${chatId}/messages`, {
                method: "POST",
                body: JSON.stringify({ body })
            });

            messages.push(data.message);
            renderMessages();
        }

        async function sendMessage() {
            let inp = document.getElementById("msgInput");
            if (!inp.value.trim()) return;

            const safeText = escapeHtml(inp.value.trim());
            try {
                await sendRawMessage(safeText);
                inp.value = "";
            } catch (err) {
                alert(err.message || "Failed to send message.");
            }
        }

        async function sendFile(e) {
            let file = e.target.files[0];
            if (!file) return;

            if (file.type.startsWith("image/")) {
                const reader = new FileReader();
                reader.onload = async () => {
                    const body = `<img src="${reader.result}" class="img-msg">`;
                    try {
                        await sendRawMessage(body);
                    } catch (err) {
                        alert(err.message || "Failed to send image.");
                    }
                };
                reader.readAsDataURL(file);
            } else {
                const body = `📄 ${escapeHtml(file.name)}`;
                try {
                    await sendRawMessage(body);
                } catch (err) {
                    alert(err.message || "Failed to send file.");
                }
            }
        }

        function toggleMic() {
            showModal("Not ready", "Voice notes will be enabled in a later update.");
        }

        function showModal(t, m) {
            document.getElementById("modalTitle").innerText = t;
            document.getElementById("modalMsg").innerText = m;
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        loadChat();
    </script>

</body>

</html>
