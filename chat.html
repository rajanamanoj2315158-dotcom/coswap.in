<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://unpkg.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — CoSwap</title>
    <link rel="stylesheet" href="theme.css">
    <script src="api.js"></script>
    <script src="ui.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Responsive Container */
        .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 1000px; margin: 0 auto; width: 100%; border-left: 1px solid rgba(255,255,255,0.08); border-right: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.01); }

        /* Header */
        .chat-header {
            padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(11, 15, 29, 0.5); backdrop-filter: blur(10px);
        }
        .user-info h2 { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
        .user-info p { font-size: 13px; color: #4fd0ff; font-weight: 600; }

        /* Messages Area */
        #messages {
            flex: 1; overflow-y: auto; padding: 24px; 
            display: flex; flex-direction: column; gap: 16px;
            scroll-behavior: smooth;
        }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; position: relative; }
        .msg.sent { align-self: flex-end; background: linear-gradient(135deg, #4fd0ff, #3b82f6); color: #fff; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: rgba(255,255,255,0.08); color: #fff; border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 10px; opacity: 0.5; margin-top: 4px; display: block; }

        /* Input Area */
        .chat-input-area {
            padding: 24px; border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; gap: 12px; background: rgba(0,0,0,0.4);
        }
        #messageInput {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 14px 20px; color: #fff; font-size: 15px; outline: none; transition: 0.2s;
        }
        #messageInput:focus { border-color: #4fd0ff; background: rgba(255,255,255,0.08); }
        .send-btn { 
            width: 50px; height: 50px; border-radius: 14px; background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); }

        /* Hide Scrollbar */
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* Body hidden on load for cleaner iframe transition */
        body { visibility: hidden; }
        body.ready { visibility: visible; }
    </style>
</head>
<body class="soft-bg">
    <div class="chat-container">
        <header class="chat-header">
            <div class="user-info">
                <h2 id="recipientName">Loading...</h2>
                <p id="listingTitle">Listing content</p>
            </div>
            <div id="statusBadge" style="font-size: 11px; padding: 4px 10px; background: rgba(34, 197, 94, 0.1); color: #22c55e; border-radius: 99px; font-weight: 700;">Live Session</div>
        </header>

        <div id="messages">
            <!-- Messages load here -->
        </div>

        <form class="chat-input-area" id="chatForm">
            <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
            <button type="submit" class="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>

    <script>
        const chatId = new URLSearchParams(window.location.search).get("id");
        if (!chatId) { window.location.href = "chatlist.html"; }

        const messagesBox = document.getElementById("messages");
        const chatForm = document.getElementById("chatForm");
        const messageInput = document.getElementById("messageInput");

        async function initChat() {
            try {
                const data = await apiRequest(`/chats/${chatId}`);
                document.getElementById("recipientName").innerText = data.chat.other_user_name;
                document.getElementById("listingTitle").innerText = data.chat.coupon_title;
                
                renderMessages(data.messages);
                document.body.classList.add("ready");
                scrollToBottom();

                // Poll for new messages every 3s
                setInterval(fetchMessages, 3000);
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchMessages() {
            try {
                const data = await apiRequest(`/chats/${chatId}`);
                renderMessages(data.messages);
            } catch (err) {}
        }

        function renderMessages(msgs) {
            const currentUserId = getCurrentUser()?.id;
            const html = msgs.map(m => `
                <div class="msg ${m.sender_id == currentUserId ? 'sent' : 'received'}">
                    ${m.content}
                    <span class="msg-meta">${new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
            `).join("");
            
            const wasAtBottom = messagesBox.scrollHeight - messagesBox.scrollTop <= messagesBox.clientHeight + 50;
            messagesBox.innerHTML = html;
            if (wasAtBottom) scrollToBottom();
        }

        function scrollToBottom() {
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const content = messageInput.value.trim();
            if (!content) return;

            messageInput.value = "";
            try {
                await apiRequest(`/chats/${chatId}/messages`, {
                    method: "POST",
                    body: JSON.stringify({ content })
                });
                fetchMessages();
            } catch (err) {
                alert("Failed to send: " + err.message);
            }
        };

        if (requireAuth(`chat.html?id=${chatId}`)) {
            initChat();
        }
    </script>
</body>
</html>
