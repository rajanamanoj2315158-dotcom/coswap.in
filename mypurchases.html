<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Purchases – CoSwap</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1c2340, #12172b, #0b0f1d);
            color: white;
            padding: 30px;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .purchase-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 22px;
            border-radius: 16px;
            margin-bottom: 18px;
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .purchase-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 18px rgba(0, 0, 0, 0.4);
        }

        .left-box {
            width: 65%;
        }

        .coupon-title {
            font-size: 20px;
            font-weight: 600;
        }

        .price {
            color: #4fd0ff;
            font-size: 18px;
            margin-top: 6px;
            font-weight: 600;
        }

        .small-info {
            margin-top: 8px;
            opacity: 0.85;
            font-size: 14px;
        }

        .status {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            display: inline-block;
        }

        .success {
            background: rgba(0, 255, 80, 0.2);
            border: 1px solid #00ff80;
        }

        .pending {
            background: rgba(255, 210, 80, 0.15);
            border: 1px solid #ffd850;
        }

        .fraud {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid red;
        }

        /* Right buttons */
        .button-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        .view-btn {
            background: linear-gradient(90deg, #4fd0ff, #6f6cff);
            color: white;
        }

        .chat-btn {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            opacity: 0.85;
        }

        /* Empty State */
        .empty-box {
            text-align: center;
            margin-top: 80px;
            opacity: 0.8;
        }

        .empty-box h2 {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .empty-box .btn {
            margin-top: 16px;
            background: linear-gradient(90deg, #4fd0ff, #6f6cff);
            color: white;
        }
    </style>
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script></head>

<body class="soft-bg">

    <h1>Your Purchases</h1>

    <div id="purchaseList"></div>

        <div id="emptyState" class="empty-box" style="display:none;">
            <h2>No Purchases Yet</h2>
            <p>Start exploring coupons in the Browse section!</p>
            <button class="btn view-btn" onclick="window.location.href='browse.html'">Browse Coupons</button>
        </div>

    <script src="api.js"></script>
    <script>
        if (!requireAuth("mypurchases.html")) {
            // redirected
        }

        let purchases = [];

        async function loadPurchases() {
            let box = document.getElementById("purchaseList");
            box.innerHTML = "";

            try {
                const data = await apiRequest("/me/purchases");
                purchases = data.purchases || [];

                if (purchases.length === 0) {
                    document.getElementById("emptyState").style.display = "block";
                    return;
                }

                purchases.forEach(p => {
                    box.innerHTML += `
                        <div class="purchase-card">
                            <div class="left-box">
                                <p class="coupon-title">${p.title}</p>
                                <p class="price">₹${p.price}</p>
                                <p class="small-info">Date: ${new Date(p.purchased_at).toLocaleDateString()}</p>
                                <span class="status ${p.status}">${formatStatus(p.status)}</span>
                            </div>

                            <div class="button-box">
                                <button class="btn view-btn" onclick="viewCoupon(${p.coupon_id})">View Coupon</button>
                                <button class="btn chat-btn" onclick="viewChat(${p.coupon_id})">View Chat</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                box.innerHTML = `<p>Failed to load purchases. ${err.message || ""}</p>`;
            }
        }

        function formatStatus(s) {
            if (s === "success") return "Successful";
            if (s === "pending") return "Under Review";
            if (s === "fraud") return "Fraud Reported";
            return s;
        }

        function viewCoupon(couponId) {
            window.location.href = `coupon-details.html?id=${couponId}`;
        }

        async function viewChat(couponId) {
            try {
                const data = await apiRequest("/chats", {
                    method: "POST",
                    body: JSON.stringify({ couponId })
                });
                window.location.href = `chat.html?id=${data.chat.id}`;
            } catch (err) {
                alert(err.message || "Unable to open chat.");
            }
        }

        loadPurchases();
    </script>

</body>

</html>
