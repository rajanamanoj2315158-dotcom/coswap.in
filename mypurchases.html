<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Purchases — CoSwap</title>
    <link rel="stylesheet" href="theme.css">
    <script src="api.js"></script>
    <script src="ui.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: white;
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar Styles (Same as mylistings.html) */
        .sidebar {
            width: 280px; height: 100vh; position: fixed; left: 0; top: 0;
            background: rgba(11, 15, 29, 0.8); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08); padding: 32px 24px;
            display: flex; flex-direction: column; z-index: 1000; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; text-decoration: none; color: white; }
        .logo-area img { width: 32px; height: 32px; }
        .logo-area span { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }

        .nav-links { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px;
            color: rgba(255, 255, 255, 0.5); text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.2s;
        }
        .nav-link:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-link.active { background: rgba(79, 208, 255, 0.1); color: #4fd0ff; }
        .nav-link svg { width: 20px; height: 20px; stroke-width: 2; }

        .sidebar-footer { padding-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.05); }

        /* Main Content */
        .main { margin-left: 280px; padding: 48px; min-height: 100vh; transition: 0.3s; }
        .header { margin-bottom: 40px; }
        .header h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
        .header p { color: rgba(255, 255, 255, 0.5); font-size: 16px; }

        /* Mobile Header */
        .mobile-header {
            display: none; position: sticky; top: 0; z-index: 900;
            background: rgba(11, 15, 29, 0.9); backdrop-filter: blur(20px);
            padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            align-items: center; justify-content: space-between;
        }
        .hamburger { background: none; border: none; color: white; cursor: pointer; padding: 4px; }

        /* Purchase Cards */
        .purchase-grid { display: grid; gap: 16px; }
        .purchase-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; padding: 24px; display: flex; align-items: center; justify-content: space-between;
            transition: 0.2s;
        }
        .purchase-card:hover { transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.05); }

        .c-info h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .c-price { font-size: 20px; font-weight: 800; color: #4fd0ff; margin-bottom: 6px; }
        .c-meta { display: flex; gap: 12px; font-size: 13px; color: rgba(255, 255, 255, 0.4); }

        .status-badge {
            padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase;
        }
        .status-success { background: rgba(0, 255, 128, 0.1); color: #00ff80; border: 1px solid rgba(0, 255, 128, 0.2); }
        .status-pending { background: rgba(255, 180, 0, 0.1); color: #ffb400; border: 1px solid rgba(255, 180, 0, 0.2); }
        .status-fraud { background: rgba(255, 50, 50, 0.1); color: #ff3232; border: 1px solid rgba(255, 50, 50, 0.2); }

        .btn-group { display: flex; gap: 10px; }
        .btn-sm {
            padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 700;
            cursor: pointer; text-decoration: none; transition: 0.2s;
        }
        .btn-primary { background: white; color: black; border: none; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2); }
        .btn-blur { background: rgba(255, 255, 255, 0.08); color: white; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-blur:hover { background: rgba(255, 255, 255, 0.15); }

        /* Empty State */
        .empty-box {
            background: rgba(255, 255, 255, 0.02); border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 80px 40px; text-align: center;
        }
        .empty-box h2 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
        .empty-box p { color: rgba(255, 255, 255, 0.5); margin-bottom: 32px; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main { margin-left: 0; padding: 24px; }
            .mobile-header { display: flex; }
            .purchase-card { flex-direction: column; align-items: flex-start; gap: 20px; }
            .btn-group { width: 100%; }
            .btn-group .btn-sm { flex: 1; text-align: center; }
        }
    </style>
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="soft-bg has-mobile-nav">
    <div class="premium-bg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="mist-container"></div>
    </div>

    <!-- Desktop Nav (Icon Based) -->
    <nav class="nav-wrapper desktop-only" style="background: rgba(15, 19, 36, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); height: 72px; position: sticky; top: 0; z-index: 1000;">
        <div class="content-container" style="display:flex; align-items:center; justify-content:space-between; height: 100%;">
            <a href="dashboard.html" class="brand" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: white;">
                <img src="logo.png" alt="CoSwap" style="width: 32px; height: 32px;">
                <span style="font-size: 20px; font-weight: 800; letter-spacing: -0.02em;">CoSwap</span>
            </a>

            <div style="display: flex; gap: 32px; align-items: center;">
                <a href="dashboard.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Dashboard</a>
                <a href="browse.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Browse</a>
                <a href="sell.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Sell</a>
                <a href="mylistings.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">My Listings</a>
            </div>

            <div style="display: flex; gap: 12px; align-items: center;">
                <a href="chatlist.html" class="btn-icon" title="Messages"><i data-lucide="message-square"></i></a>
                <a href="profile.html" class="btn-icon" title="Profile"><i data-lucide="user"></i></a>
                <a href="login.html" class="btn-icon" title="Logout" style="color: var(--danger);"><i data-lucide="log-out"></i></a>
            </div>
        </div>
    </nav>

    <!-- Mobile Header -->
    <header class="mobile-header" style="display: none; padding: 16px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; background: rgba(15, 19, 36, 0.9); backdrop-filter: blur(20px);">
        <a href="dashboard.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: white;">
            <img src="logo.png" alt="CoSwap" style="width: 28px; height: 28px;">
            <span style="font-weight: 800; font-size: 18px;">CoSwap</span>
        </a>
        <div style="display: flex; gap: 16px; align-items: center;">
            <a href="chatlist.html" style="color: white;"><i data-lucide="message-square"></i></a>
            <a href="profile.html" style="color: white;"><i data-lucide="user"></i></a>
            <button id="menuToggle" style="background: none; border: none; color: white;"><i data-lucide="menu"></i></button>
        </div>
    </header>

    <main class="content-container" style="padding: 40px 24px 80px;">
        <header style="margin-bottom: 40px;">
            <h1 style="font-size: 36px; font-weight: 800; letter-spacing: -0.02em;">My Purchases</h1>
            <p style="color: rgba(255,255,255,0.5); margin-top: 4px;">Track and manage your coupon acquisitions.</p>
        </header>

        <div id="purchaseList" class="purchase-grid">
            <div style="text-align: center; padding: 40px; opacity: 0.5;">Loading purchases...</div>
        </div>

        <div id="emptyState" class="empty-box" style="display:none;">
            <h2>No Purchases Yet</h2>
            <p>Start exploring unused coupons and vouchers in the marketplace.</p>
            <button class="btn-sm btn-primary" onclick="window.location.href='browse.html'" style="padding: 14px 28px;">Browse Marketplace</button>
        </div>
    </main>

    <!-- Bottom Nav for Mobile -->
    <nav class="mobile-nav">
        <div class="mobile-nav-inner">
            <a href="dashboard.html" class="mobile-nav-item"><i data-lucide="layout-dashboard"></i><span>Home</span></a>
            <a href="browse.html" class="mobile-nav-item"><i data-lucide="search"></i><span>Browse</span></a>
            <a href="sell.html" class="mobile-nav-item"><i data-lucide="plus-circle"></i><span>Sell</span></a>
            <a href="chatlist.html" class="mobile-nav-item"><i data-lucide="message-square"></i><span>Chat</span></a>
        </div>
    </nav>
    <script>lucide.createIcons();</script>
    <script>
        if (!requireAuth("mypurchases.html")) {
            // redirected
        }

        // Mobile Menu Toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar'); // This element no longer exists in the HTML
        // const mainContent = document.getElementById('mainContent'); // This element no longer exists in the HTML

        menuToggle.addEventListener('click', () => {
            // sidebar.classList.toggle('active'); // This element no longer exists in the HTML
        });

        // mainContent.addEventListener('click', () => { // This element no longer exists in the HTML
        //     if (sidebar.classList.contains('active')) {
        //         sidebar.classList.remove('active');
        //     }
        // });

        async function loadPurchases() {
            let box = document.getElementById("purchaseList");
            let empty = document.getElementById("emptyState");

            try {
                const data = await apiRequest("/me/purchases");
                const purchases = data.purchases || [];

                if (purchases.length === 0) {
                    box.style.display = "none";
                    empty.style.display = "block";
                    return;
                }

                box.innerHTML = purchases.map(p => {
                    const statusClass = `status-${p.status}`;
                    const statusText = formatStatus(p.status);
                    
                    return `
                        <div class="purchase-card">
                            <div class="c-info">
                                <span class="status-badge ${statusClass}">${statusText}</span>
                                <h3 style="margin-top: 12px;">${p.title}</h3>
                                <div class="c-price">₹${p.price}</div>
                                <div class="c-meta">
                                    <span>Purchased: ${new Date(p.purchased_at).toLocaleDateString()}</span>
                                </div>
                            </div>

                            <div class="btn-group">
                                <button class="btn-sm btn-blur" onclick="viewChat(${p.coupon_id})">View Chat</button>
                                <button class="btn-sm btn-primary" onclick="viewCoupon(${p.coupon_id})">View Coupon</button>
                            </div>
                        </div>
                    `;
                }).join("");
            } catch (err) {
                box.innerHTML = `<div style="text-align: center; color: #ff3b30; padding: 40px;">Failed to load purchases. ${err.message || ""}</div>`;
            }
        }

        function formatStatus(s) {
            if (s === "success") return "Successful";
            if (s === "pending") return "Under Review";
            if (s === "fraud") return "Fraud Reported";
            return s;
        }

        function viewCoupon(couponId) {
            window.location.href = `coupon-details.html?id=${couponId}`;
        }

        async function viewChat(couponId) {
            try {
                const data = await apiRequest("/chats", {
                    method: "POST",
                    body: JSON.stringify({ couponId })
                });
                window.location.href = `chat.html?id=${data.chat.id}`;
            } catch (err) {
                alert(err.message || "Unable to open chat.");
            }
        }

        loadPurchases();
    </script>
</body>
</html>
