<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://unpkg.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — CoSwap</title>
    <link rel="preload" href="theme.css" as="style">
    <link rel="stylesheet" href="theme.css">
    <script src="api.js" defer></script>
    <script src="ui.js" defer></script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://coswap.in/">
    <meta property="og:title" content="CoSwap – Buy and Sell Coupons Instantly">
    <meta property="og:description" content="Discover unused coupons from other users or sell your own in seconds.">
    <meta property="og:image" content="https://coswap.in/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://coswap.in/">
    <meta property="twitter:title" content="CoSwap – Buy and Sell Coupons Instantly">
    <meta property="twitter:description" content="Discover unused coupons from other users or sell your own in seconds.">
    <meta property="twitter:image" content="https://coswap.in/logo.png">

</head>
<body class="soft-bg">
    <!-- Premium Background System -->
    <div class="premium-bg-system parallax-bg" aria-hidden="true">
        <div class="aurora-layer"></div>
        <div class="ripple-layer">
            <div class="liquid-ripple" style="top:50%; left:50%;"></div>
        </div>
    </div>

    <nav class="navbar"></nav>

    <main class="container" style="padding: 40px 24px 120px; height: calc(100vh - 72px); display: flex; flex-direction: column;">
        <header id="chatHeaderMain" style="margin-bottom: 24px;">
            <h1 class="hero-title" style="margin-bottom: 8px;">Inbox</h1>
            <p class="hero-subtitle">Negotiate deals and redeem codes securely.</p>
        </header>

        <div class="card" id="chatContainer" style="flex: 1; display: grid; grid-template-columns: 350px 1fr; overflow: hidden; padding: 0;">
            <!-- Thread List -->
            <div id="threadPane" style="border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; background: rgba(255,255,255,0.01);">
                <div style="padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 800; font-size: 11px; text-transform: uppercase; color: rgba(255,255,255,0.4); letter-spacing: 0.05em;">Conversations</div>
                <div id="threadList" style="flex: 1; overflow-y: auto;">
                    <div style="padding: 40px; text-align: center; opacity: 0.5;">Syncing messages...</div>
                </div>
            </div>

            <!-- Active Chat Window -->
            <div id="activeChat" style="display: flex; flex-direction: column; background: rgba(0,0,0,0.2);">
                <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.15); flex-direction: column; gap: 20px; text-align: center; padding: 40px;">
                    <i data-lucide="message-square" style="width: 64px; height: 64px; opacity: 0.05;"></i>
                    <p style="font-size: 14px;">Select a conversation to start<br>the marketplace exchange.</p>
                </div>
            </div>
        </div>
    </main>

    <style>
        .thread-item {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .thread-item:hover { background: rgba(255,255,255,0.02); }
        .thread-item.active { background: rgba(79, 208, 255, 0.08); border-left: 4px solid #4fd0ff; }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .msg.sent {
            align-self: flex-end;
            background: #4fd0ff;
            color: #020617;
            font-weight: 600;
            border-bottom-right-radius: 4px;
        }
        .msg.received {
            align-self: flex-start;
            background: rgba(255,255,255,0.08);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 12px;
            background: rgba(15, 23, 42, 0.4);
        }

        @media (max-width: 768px) {
            #chatContainer { grid-template-columns: 1fr; }
            #activeChat { 
                position: fixed; inset: 0; z-index: 3000; 
                display: none; background: #0a0d18; 
                padding-bottom: env(safe-area-inset-bottom);
            }
            #activeChat.mobile-active { display: flex; }
            .msg { max-width: 90%; }
        }
    </style>

    <nav class="mobile-nav" aria-label="Mobile navigation">
        <div class="mobile-nav-inner">
            <a href="dashboard.html" class="mobile-nav-item"><i data-lucide="layout-dashboard"></i><span>Home</span></a>
            <a href="browse.html" class="mobile-nav-item"><i data-lucide="search"></i><span>Browse</span></a>
            <a href="sell.html" class="mobile-nav-item"><i data-lucide="plus-circle"></i><span>Sell</span></a>
            <a href="chatlist.html" class="mobile-nav-item active"><i data-lucide="message-square"></i><span>Chat</span></a>
        </div>
    </nav>

    <script>
        let currentChatId = null;
        let pollInterval = null;

        document.addEventListener("DOMContentLoaded", () => {
            if (!getAuthToken()) {
                window.location.href = "login.html";
                return;
            }
            loadThreads();
            if (window.lucide) window.lucide.createIcons();
        });

        function escapeHtml(str) {
            if (!str) return "";
            return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
        }

        async function loadThreads() {
            const list = document.getElementById("threadList");
            try {
                const data = await apiRequest("/chats");
                const threads = data.chats || [];
                
                if (threads.length === 0) {
                    list.innerHTML = `<div style="padding: 60px 24px; text-align: center; opacity: 0.3; font-size: 14px;">No active conversations yet.</div>`;
                    return;
                }

                list.innerHTML = threads.map(t => `
                    <div class="thread-item ${currentChatId == t.id ? 'active' : ''}" onclick="selectChat(${t.id}, '${escapeHtml(t.other_user_name)}', '${escapeHtml(t.coupon_title)}')">
                        <div style="font-weight: 800; font-size: 16px; margin-bottom: 4px; color: ${currentChatId == t.id ? '#4fd0ff' : 'white'}">${escapeHtml(t.other_user_name)}</div>
                        <div style="font-size: 12px; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(t.coupon_title)}</div>
                    </div>
                `).join("");
            } catch (err) {
                list.innerHTML = `<div style="padding: 24px; text-align: center; color: var(--danger);">Refresh to link chat cloud.</div>`;
            }
        }

        async function selectChat(id, name, title) {
            currentChatId = id;
            loadThreads();
            
            const activeChat = document.getElementById("activeChat");
            activeChat.classList.add("mobile-active");
            activeChat.innerHTML = `
                <div style="padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; background: rgba(15, 23, 42, 0.6);">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <button onclick="closeMobileChat()" style="background: none; border: none; color: white; display: none;" id="backBtn"><i data-lucide="arrow-left"></i></button>
                        <div>
                            <div style="font-weight: 800; font-size: 16px;">${name}</div>
                            <div style="font-size: 11px; color: #4fd0ff; font-weight: 700; text-transform: uppercase;">${title}</div>
                        </div>
                    </div>
                    <button onclick="closeMobileChat()" style="background: rgba(255,255,255,0.05); border: none; color: white; padding: 8px; border-radius: 8px; cursor: pointer;"><i data-lucide="x"></i></button>
                </div>
                <div id="messages"></div>
                <form class="chat-input-area" onsubmit="handleSendMessage(event)">
                    <input type="text" id="messageInput" placeholder="Secure message..." autocomplete="off" style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px; color: white; outline: none;">
                    <button type="submit" class="button-primary" style="padding: 0 16px; height: 44px; font-size: 14px;">Send</button>
                </form>
            `;
            
            if (window.innerWidth <= 768) {
                document.getElementById('backBtn').style.display = 'block';
            }

            if (window.lucide) window.lucide.createIcons();
            fetchMessages();
            
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(fetchMessages, 3000);
        }

        function closeMobileChat() {
            document.getElementById("activeChat").classList.remove("mobile-active");
            if (pollInterval) clearInterval(pollInterval);
            currentChatId = null;
            loadThreads();
        }

        async function fetchMessages() {
            if (!currentChatId) return;
            try {
                const data = await apiRequest(\`/chats/\${currentChatId}\`);
                renderMessages(data.messages);
            } catch (err) {}
        }

        function renderMessages(msgs) {
            const box = document.getElementById("messages");
            if (!box) return;
            const currentUserId = getCurrentUser()?.id;
            
            const html = msgs.map(m => `
                <div class="msg \${m.sender_id == currentUserId ? 'sent' : 'received'}">
                    \${escapeHtml(m.content)}
                </div>
            `).join("");
            
            const wasAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 100;
            box.innerHTML = html;
            if (wasAtBottom) box.scrollTop = box.scrollHeight;
        }

        async function handleSendMessage(e) {
            e.preventDefault();
            const input = document.getElementById("messageInput");
            const content = input.value.trim();
            if (!content || !currentChatId) return;

            input.value = "";
            try {
                await apiRequest(\`/chats/\${currentChatId}/messages\`, {
                    method: "POST",
                    body: JSON.stringify({ content })
                });
                fetchMessages();
            } catch (err) {
                showToast(err.message || 'Failed to send.', 'error');
            }
        }
    </script>
    <script src="components.js" defer></script>
</body>
</html>
