<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://unpkg.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – CoSwap</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #141828, #0b0f1e, #05060a);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            width: 420px;
            padding: 40px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.13);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.45);
            text-align: center;
        }

        .logo-img {
            width: 75px;
            margin: 0 auto 15px auto;
        }

        h2 {
            font-size: 27px;
            margin-bottom: 15px;
        }

        p {
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        label {
            font-size: 14px;
            opacity: 0.9;
            display: block;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font-size: 15px;
            transition: 0.2s;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 0 2px #4fd0ff;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(90deg, #4fd0ff, #7b5bff);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }


    </style>

    <link rel="preload" href="theme.css" as="style">
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script>
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://coswap.in/">
    <meta property="og:title" content="CoSwap – Buy and Sell Coupons Instantly">
    <meta property="og:description" content="Discover unused coupons from other users or sell your own in seconds.">
    <meta property="og:image" content="https://coswap.in/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://coswap.in/">
    <meta property="twitter:title" content="CoSwap – Buy and Sell Coupons Instantly">
    <meta property="twitter:description" content="Discover unused coupons from other users or sell your own in seconds.">
    <meta property="twitter:image" content="https://coswap.in/logo.png">

</head>

<body>

    <div class="card">
        <img src="logo.png" class="logo-img" alt="Image" loading="lazy">

        <h2>Forgot Password</h2>

        <p>Enter your email to receive a verification code.</p>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <button class="btn-submit" onclick="sendOTP()">Send OTP</button>
    </div>

    <div id="toast" class="toast"></div>

    <script src="api.js" defer></script>
    <script>
        function showToast(message) {
            const el = document.getElementById("toast");
            el.textContent = message;
            el.classList.add("show");
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.remove("show"), 2200);
        }

        async function sendOTP() {
            let email = document.getElementById("email").value.trim();

            if (email === "") {
                showToast("Please enter your email.");
                return;
            }

            try {
                const data = await apiRequest("/auth/forgot", {
                    method: "POST",
                    body: JSON.stringify({ email })
                });

                localStorage.setItem("RESET_EMAIL", email);
                localStorage.setItem("RESET_OTP", data.otp || "");

                showToast("OTP sent. Check your email.");
                window.location.href = "otp.html";
            } catch (err) {
                showToast(err.message || "Failed to send OTP.");
            }
        }
    </script>

    <script src="components.js" defer></script>
</body>

</html>
