<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Listings — CoSwap</title>
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script>
    <link rel="canonical" href="https://coswap.in/mylistings.html">
</head>
<body class="soft-bg">
    <nav class="navbar">
        <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: white;">
            <img src="logo.png" alt="CoSwap" style="width: 32px; height: 32px;">
            <span style="font-size: 20px; font-weight: 800; letter-spacing: -0.04em;">CoSwap</span>
        </a>
        
        <div class="nav-menu">
            <a href="browse.html" class="nav-link">Browse</a>
            <a href="sell.html" class="nav-link">Sell</a>
            <a href="dashboard.html" class="nav-link active">My Listings</a>
            <a href="chatlist.html" class="nav-link">Messages</a>
            <a href="profile.html" class="nav-link">Profile</a>
        </div>

        <div class="nav-right">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=coswap" alt="Avatar" class="user-avatar" onclick="window.location.href='profile.html'">
            <i data-lucide="log-out" class="logout-icon" onclick="handleLogout()" style="width: 20px;"></i>
        </div>
    </nav>

    <main class="container" style="padding: 40px 24px 80px;">
        <header style="margin-bottom: 48px; text-align: center;">
            <h1 class="heading-elite">My Active Listings</h1>
            <p class="subtext-elite" style="margin: 0 auto;">Manage your posted coupons and track your sales progress.</p>
        </header>

        <div id="listingsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px;">
            <!-- Loaded via API -->
        </div>

        <div id="emptyState" class="card" style="display:none; text-align: center; padding: 60px 40px;">
            <i data-lucide="ticket" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.1;"></i>
            <p style="color: rgba(255,255,255,0.5); margin-bottom: 24px;">You haven't listed any coupons yet.</p>
            <button class="button-primary" onclick="window.location.href='sell.html'" style="padding: 0 32px;">Sell Your First Coupon</button>
        </div>
    </main>

    <!-- DELETE POPUP -->
    <div id="deletePopup" style="position:fixed; inset:0; background:rgba(2, 6, 23, 0.8); backdrop-filter:blur(12px); z-index:2000; display:none; align-items:center; justify-content:center; padding:24px;">
        <div class="card" style="max-width:400px; width: 100%; text-align:center; padding: 32px;">
            <h3 style="font-size:20px; font-weight: 800; margin-bottom:12px;">Delete Listing?</h3>
            <p style="color:rgba(255,255,255,0.5); margin-bottom:24px;">This action cannot be undone. Your coupon will be removed from the marketplace.</p>
            <div style="display:flex; gap:12px;">
                <button onclick="closePopup()" class="button-secondary" style="flex:1;">Cancel</button>
                <button id="confirmBtn" class="button-primary" style="flex:1; background: #ef4444;">Delete</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof requireAuth === 'function' && !requireAuth()) return;
            load();
            lucide.createIcons();
        });

        function go(p) { window.location.href = p; }
        
        let listings = [];
        let delId = null;

        async function load() {
            const grid = document.getElementById('listingsGrid');
            const empty = document.getElementById('emptyState');
            grid.innerHTML = '';
            
            try {
                const data = await apiRequest('/me/listings');
                listings = data.coupons || [];
                
                if (listings.length === 0) {
                    empty.style.display = 'block';
                    return;
                }
                
                empty.style.display = 'none';
                grid.innerHTML = listings.map(c => `
                    <div class="card" style="display: flex; flex-direction: column; gap: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="font-size: 11px; font-weight: 800; color: ${c.status === 'sold' ? '#ff4d4d' : '#22c55e'}; text-transform: uppercase; letter-spacing: 0.05em; background: ${c.status === 'sold' ? 'rgba(255, 77, 77, 0.1)' : 'rgba(34, 197, 94, 0.1)'}; padding: 4px 8px; border-radius: 4px;">
                                ${c.status === 'sold' ? 'Sold' : 'Active'}
                            </div>
                            <div style="font-size: 12px; color: rgba(255,255,255,0.3); font-family: monospace;">#${c.id.slice(-6)}</div>
                        </div>
                        
                        <div style="flex: 1;">
                            <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.4;">${escapeHtml(c.title)}</h3>
                            <div style="font-size: 24px; font-weight: 800; color: #38bdf8; margin-bottom: 12px;">₹${escapeHtml(String(c.price))}</div>
                            <div style="font-size: 12px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 6px;">
                                <i data-lucide="calendar" style="width: 12px;"></i> Expires: ${escapeHtml(c.expiry || 'N/A')}
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; pt-4">
                            <button class="button-secondary" onclick="go('editcoupon.html?id=${c.id}')" style="height: 40px; font-size: 13px;">Edit</button>
                            <button class="button-secondary" onclick="openPopup('${c.id}')" style="height: 40px; font-size: 13px; color: #ff4d4d; border-color: rgba(255, 77, 77, 0.2);">Delete</button>
                        </div>
                    </div>
                `).join('');
                
                lucide.createIcons();
            } catch (err) {
                grid.innerHTML = `<div class="card" style="color: #ff4d4d; text-align: center;">Error loading listings. Please refresh.</div>`;
            }
        }

        function openPopup(id) { delId = id; document.getElementById('deletePopup').style.display='flex'; }
        function closePopup() { document.getElementById('deletePopup').style.display='none'; }

        document.getElementById('confirmBtn').onclick = async () => {
            try {
                await apiRequest(`/coupons/${delId}`, { method: 'DELETE' });
                closePopup();
                load();
            } catch (err) { alert('Failed to delete listing.'); }
        };

        function handleLogout() {
            if (confirm("Sign out from CoSwap?")) {
                if (typeof clearAuth === 'function') clearAuth();
                window.location.href = "login.html";
            }
        }

        function escapeHtml(s) {
            return s ? String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : '';
        }
    </script>
</body>
</html>
