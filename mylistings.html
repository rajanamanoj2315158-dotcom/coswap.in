<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Listings — CoSwap</title>
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
        body { background: #000; color: white; min-height: 100vh; overflow-x: hidden; }

        /* DESKTOP SIDEBAR (Visible > 768px) */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            padding: 40px 24px;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; text-align: center; color: white; }
        .menu-item {
            padding: 12px 16px; margin-bottom: 8px; border-radius: 12px;
            cursor: pointer; transition: 0.2s; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.6);
        }
        .menu-item:hover { background: rgba(255,255,255,0.08); color: white; }
        .menu-item.active { background: white; color: black; font-weight: 700; }

        /* MAIN AREA */
        .main {
            margin-left: 260px;
            padding: 60px 48px;
            max-width: 1400px;
        }

        .header-section { margin-bottom: 48px; }
        .header-section h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
        .header-section p { color: rgba(255,255,255,0.5); font-size: 16px; }

        /* MOBILE TOP BAR (Visible < 768px) */
        .mobile-header {
            display: none;
            position: sticky; top: 0; z-index: 900;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            align-items: center; justify-content: space-between;
        }
        .hamburger { background: none; border: none; color: white; cursor: pointer; padding: 4px; }
        .mobile-title { font-size: 18px; font-weight: 700; }

        /* LISTING GRID */
        .grid {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
        .card-price { font-size: 20px; font-weight: 800; color: #4fd0ff; margin-bottom: 12px; }
        .card-meta { font-size: 13px; color: rgba(255,255,255,0.5); display: flex; gap: 12px; margin-bottom: 20px; }
        .btn-row { display: flex; gap: 12px; }
        .btn {
            flex: 1; padding: 12px; border-radius: 12px; border: none;
            font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-edit { background: white; color: black; }
        .btn-delete { background: rgba(255, 59, 48, 0.1); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.2); }

        /* EMPTY STATE */
        .empty-box {
            text-align: center; padding: 100px 24px;
        }
        .empty-box p { font-size: 18px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }
        .sell-btn {
            background: linear-gradient(90deg, #4fd0ff, #7b5bff);
            color: white; border: none; padding: 16px 32px; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .sell-btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* OVERLAY for mobile drawer */
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 999; display: none;
        }

        /* RESPONSIVENESS */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .mobile-header { display: flex; }
            .main { margin-left: 0; padding: 32px 24px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="soft-bg">
    <div class="premium-bg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Mobile Header -->
    <header class="mobile-header">
        <button class="hamburger" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="mobile-title">My Listings</span>
        <div style="width:24px;"></div> <!-- placeholder for balance -->
    </header>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="logo">CoSwap</div>
        <div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
        <div class="menu-item" onclick="go('browse.html')">Browse Coupons</div>
        <div class="menu-item" onclick="go('sell.html')">Sell a Coupon</div>
        <div class="menu-item active" onclick="go('mylistings.html')">My Listings</div>
        <div class="menu-item" onclick="go('mypurchases.html')">My Purchases</div>
        <div class="menu-item" onclick="go('profile.html')">My Profile</div>
        <div class="menu-item" onclick="go('requests.html')">Requests</div>
        <div class="menu-item" onclick="go('chatlist.html')">Chat</div>
    </div>

    <!-- MAIN -->
    <main class="main">
        <div class="header-section">
            <h1>My Coupon Listings</h1>
            <p>Manage, edit or remove your posted coupons.</p>
        </div>

        <div id="listingsGrid" class="grid"></div>

        <div id="emptyState" class="empty-box" style="display:none;">
            <p>No coupons listed yet.</p>
            <button class="sell-btn" onclick="go('sell.html')">Post Your First Coupon</button>
        </div>
    </main>

    <!-- DELETE POPUP -->
    <div id="deletePopup" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:2000; display:none; align-items:center; justify-content:center; padding:24px;">
        <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:24px; padding:32px; width:100%; max-width:400px; text-align:center;">
            <h3 style="font-size:20px; margin-bottom:12px;">Delete Coupon?</h3>
            <p style="color:rgba(255,255,255,0.5); margin-bottom:24px;">This action cannot be undone and your listing will be removed from the marketplace.</p>
            <div style="display:flex; gap:12px;">
                <button onclick="closePopup()" style="flex:1; padding:12px; border-radius:12px; border:none; background:rgba(255,255,255,0.1); color:white; font-weight:700; cursor:pointer;">Cancel</button>
                <button id="confirmBtn" style="flex:1; padding:12px; border-radius:12px; border:none; background:#ff3b30; color:white; font-weight:700; cursor:pointer;">Delete</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        function go(p) { window.location.href = p; }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        let listings = [];
        let delId = null;

        async function load() {
            const grid = document.getElementById('listingsGrid');
            const empty = document.getElementById('emptyState');
            grid.innerHTML = '';
            
            try {
                const data = await apiRequest('/me/listings');
                listings = data.coupons || [];
                
                if (listings.length === 0) {
                    empty.style.display = 'block';
                    return;
                }
                
                empty.style.display = 'none';
                grid.innerHTML = listings.map(c => `
                    <div class="card">
                        <div class="card-tag" style="font-size:11px; font-weight:700; color:${c.status === 'sold' ? '#ff3b30' : '#00ff9d'}; text-transform:uppercase; margin-bottom:8px;">
                            ${c.status === 'sold' ? 'Sold' : 'Active'}
                        </div>
                        <div class="card-title">${escapeHtml(c.title)}</div>
                        <div class="card-price">₹${escapeHtml(String(c.price))}</div>
                        <div class="card-meta">
                            <span>ID: ${c.id.slice(-6)}</span>
                            <span>•</span>
                            <span>Expires: ${escapeHtml(c.expiry || 'N/A')}</span>
                        </div>
                        <div class="btn-row">
                            <button class="btn btn-edit" onclick="go('editcoupon.html?id=${c.id}')">Edit</button>
                            <button class="btn btn-delete" onclick="openPopup('${c.id}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `<p style="color:#ff3b30;">Error loading listings. Please try again.</p>`;
            }
        }

        function openPopup(id) { delId = id; document.getElementById('deletePopup').style.display='flex'; }
        function closePopup() { document.getElementById('deletePopup').style.display='none'; }

        document.getElementById('confirmBtn').onclick = async () => {
            try {
                await apiRequest(`/coupons/${delId}`, { method: 'DELETE' });
                closePopup();
                load();
            } catch (err) { alert('Failed to delete listing.'); }
        };

        function escapeHtml(s) {
            return s ? String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : '';
        }

        load();
    </script>
</body>
</html>
