<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoSwap – Swap Coupons for Cash</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #000;
            overflow-x: hidden;
            color: white;
        }

        /* HERO SECTION (background with coupons included) */
        .hero {
            width: 100%;
            height: 100vh;
            background-image: url("bg.png");
            background-size: cover;
            background-position: center;
            padding: 40px;
            position: relative;
        }

        /* NAVBAR */
        nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .logo {
            width: 65px;
            margin-right: 10px;
        }

        .brand {
            font-size: 30px;
            font-weight: 700;
            color: #45c9ff;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 40px;
        }

        nav ul li a {
            text-decoration: none;
            font-size: 18px;
            color: #ffffffd7;
            transition: 0.25s;
        }

        nav ul li a:hover {
            color: white;
        }

        .signin-btn {
            padding: 10px 22px;
            background: #4e7bff;
            border-radius: 8px;
            color: white !important;
        }

        /* MAIN CONTENT */
        .content-box {
            margin-top: 120px;
            max-width: 550px;
        }

        .title {
            font-size: 60px;
            font-weight: 700;
            line-height: 1.2;
        }

        .subtitle {
            margin-top: 25px;
            font-size: 19px;
            opacity: 0.85;
            line-height: 1.5;
        }

        /* BUTTON WRAPPER */
        .btn-group {
            margin-top: 40px;
            display: flex;
            align-items: center;
        }

        /* Animated Browse Button */
        .browse-btn {
            padding: 14px 32px;
            font-size: 18px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            background: linear-gradient(90deg, #4fd0ff, #6f6cff);
            position: relative;
            overflow: hidden;
        }

        /* Rotating glowing ring */
        .browse-btn::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 180%;
            height: 180%;
            background: conic-gradient(#4fd0ff,
                    #6f6cff,
                    #a46fff,
                    #4fd0ff);
            transform: translate(-50%, -50%) rotate(0deg);
            border-radius: 50%;
            animation: rotateRing 6s linear infinite;
            z-index: -1;
        }

        /* Button mask to keep center solid */
        .browse-btn::after {
            content: "";
            position: absolute;
            inset: 3px;
            background: linear-gradient(90deg, #4fd0ff, #6f6cff);
            border-radius: 12px;
            z-index: 1;
        }

        .browse-btn span {
            position: relative;
            z-index: 2;
        }

        /* Rotation Animation */
        @keyframes rotateRing {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* Sell Button */
        .sell-btn {
            padding: 14px 32px;
            font-size: 18px;
            border-radius: 14px;
            text-decoration: none;
            border: 2px solid white;
            color: white;
            margin-left: 20px;
            transition: 0.2s ease;
        }

        .sell-btn:hover {
            background: white;
            color: black;
        }
    </style>
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script></head>

<body>

    <header class="hero">

        <!-- NAVIGATION -->
        <nav>
            <div class="nav-left">
                <img src="logo.png" class="logo">
                <h2 class="brand">CoSwap</h2>
            </div>

            <ul>
                <li><a href="how-it-works.html">How It Works</a></li>
                <li><a href="about.html">About Us</a></li>

                <!-- Sign In -->
                <li><a href="login.html" class="signin-btn">Sign In</a></li>
            </ul>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="content-box">
            <h1 class="title">Swap Unused <br> Coupons for Cash</h1>

            <p class="subtitle">
                Convert unwanted vouchers into spendable money.<br>
                Discover amazing deals from others.
            </p>

            <div class="btn-group">

                <!-- Browse Button -->
                <a href="browse.html" class="browse-btn"><span>Browse Coupons</span></a>

                <!-- FIXED: Sell Button Redirects to Login First -->
                <a href="login.html?redirect=sell" class="sell-btn">Sell a Coupon</a>
            </div>
        </div>

</header>

<script>
    // Auto-redirect if already logged in
    if (localStorage.getItem("authToken")) {
        window.location.href = "dashboard.html";
    }
</script>

</body>

</html>
