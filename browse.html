<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Coupons – CoSwap</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1c2340, #12172b, #0b0f1d);
            color: white;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SIDEBAR (MATCHES MY LISTINGS EXACTLY) */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            padding: 35px 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            height: 100vh;
            position: fixed;
        }

        .logo {
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 35px;
        }

        .menu-item {
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: .2s;
            font-size: 16px;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .active {
            background: linear-gradient(90deg, #4fd0ff, #7b5bff);
            font-weight: 600;
        }

        /* MAIN */
        .main {
            flex: 1;
            margin-left: 260px;
            padding: 35px 45px;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .top-actions {
            display: flex;
            gap: 12px;
        }

        .top-btn {
            padding: 10px 18px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: white;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
        }

        .top-btn:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
        }

        /* SEARCH + FILTER */
        .search-box {
            width: 100%;
            margin: 20px 0;
            padding: 16px 18px;
            border-radius: 14px;
            border: none;
            outline: none;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            transition: .25s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.45);
        }

        .card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
        }

        .card-body {
            padding: 16px;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
        }

        .meta {
            font-size: 14px;
            opacity: 0.85;
            margin: 6px 0;
        }

        .desc {
            font-size: 14px;
            opacity: 0.8;
            margin: 6px 0 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .stats {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 10px;
            font-size: 14px;
            margin: 10px 0;
        }

        .price {
            color: #4fd0ff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            margin-top: 8px;
        }

        .buy {
            background: linear-gradient(90deg, #4fd0ff, #7b5bff);
            color: white;
        }

        .details {
            background: rgba(255, 255, 255, 0.18);
            color: white;
        }
    </style>
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script></head>

<body class="soft-bg">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">CoSwap</div>
        <div class="menu-item" onclick="go('dashboard.html')">Dashboard</div>
        <div class="menu-item active">Browse Coupons</div>
        <div class="menu-item" onclick="go('sell.html')">Sell a Coupon</div>
        <div class="menu-item" onclick="go('mylistings.html')">My Listings</div>
        <div class="menu-item" onclick="go('mypurchases.html')">My Purchases</div>
        <div class="menu-item" onclick="go('sellerprofile.html')">My Profile</div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="top-bar">
            <h1>Browse Coupons</h1>

            <div class="top-actions">
                <button class="top-btn" onclick="go('wallet.html')">💰 Wallet</button>
                <button class="top-btn" onclick="go('chatlist.html')">💬 Chat</button>
                <button class="top-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <input class="search-box" placeholder="Search coupons (Music, Food, OTT, Shopping...)">

        <div id="grid" class="grid"></div>
    </div>

    <script src="api.js"></script>
    <script>
        function go(page) {
            window.location.href = page;
        }

        /* LOGOUT SECURITY */
        function logout() {
            clearAuth();
            window.location.replace("index.html");
        }

        /* LOAD COUPONS */
        const grid = document.getElementById("grid");
        let coupons = [];

        async function loadCoupons(searchTerm = "") {
            grid.innerHTML = "<p>Loading coupons...</p>";

            try {
                const query = searchTerm ? `?search=${encodeURIComponent(searchTerm)}` : "";
                const data = await apiRequest(`/coupons${query}`);
                coupons = data.coupons || [];

                if (coupons.length === 0) {
                    grid.innerHTML = "<p>No active coupons available.</p>";
                    return;
                }

                grid.innerHTML = "";
                coupons.forEach((c, index) => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${c.image_url || 'bg.png'}" onerror="this.src='bg.png'">
                            <div class="card-body">
                                <div class="title">${c.title}</div>
                                <div class="meta">Expires: ${c.expiry || "N/A"}</div>
                                <div class="desc">${c.details || "No description provided."}</div>

                                <div class="stats">
                                    ⭐ Rating: ${c.seller_rating ? c.seller_rating : "Not rated"} &nbsp; | &nbsp;
                                    ⚠ Fraud: ${c.seller_fraud_percent ?? 0}% &nbsp; | &nbsp;
                                    🏆 Level ${c.seller_level || 1}
                                </div>

                                <div class="price">₹${c.price}</div>

                                <button class="btn buy" onclick="handleBuy(${index})">Buy Now</button>
                                <button class="btn details" onclick="handleDetails(${index})">Details</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                grid.innerHTML = `<p>Failed to load coupons. ${err.message || ""}</p>`;
            }
        }

        function handleBuy(index) {
            const coupon = coupons[index];

            if (!getAuthToken()) {
                localStorage.setItem("redirectAfterLogin", `buy.html?id=${coupon.id}`);
                window.location.href = "login.html";
                return;
            }

            window.location.href = `buy.html?id=${coupon.id}`;
        }

        function handleDetails(index) {
            const coupon = coupons[index];
            window.location.href = `coupon-details.html?id=${coupon.id}`;
        }

        const searchInput = document.querySelector(".search-box");
        let searchTimer = null;
        searchInput.addEventListener("input", () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                loadCoupons(searchInput.value.trim());
            }, 250);
        });

        loadCoupons();
    </script>

</body>

</html>
