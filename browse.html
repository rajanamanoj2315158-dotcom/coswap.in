<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Marketplace — CoSwap</title>
    <link rel="stylesheet" href="theme.css">
    <script src="ui.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: white; 
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 100px;
            position: relative;
            z-index: 1;
        }

        /* Top Nav */
        .nav-wrapper {
            position: sticky; top: 0; z-index: 100;
            background: rgba(11, 15, 29, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; font-weight: 800; }
        .nav-left img { width: 32px; height: 32px; }
        .nav-center { display: flex; gap: 24px; }
        .nav-center a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .nav-center a:hover { color: white; }
        .nav-center a.active { color: white; }

        /* Hero / Search Section */
        .search-hero {
            text-align: center;
            margin: 60px 0 40px;
        }
        .search-hero h1 {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 32px;
        }
        .search-wrapper {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }
        .search-inner {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 8px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .search-inner:focus-within {
            border-color: #4fd0ff;
            box-shadow: 0 0 0 4px rgba(79, 208, 255, 0.1);
        }
        .search-box {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            padding: 12px 20px;
            outline: none;
        }
        .search-btn {
            background: white;
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-btn:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        /* Category Chips */
        .category-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
        }
        .chip {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .chip:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateY(-1px);
        }
        .chip.active {
            background: white;
            color: black;
        }

        /* Grids */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            margin-top: 60px;
        }
        .section-header h2 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .results-grid {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        .coupon-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }
        .coupon-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .card-img {
            height: 180px;
            width: 100%;
            object-fit: cover;
            background: #111;
        }
        .card-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-tag {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #4fd0ff;
            margin-bottom: 8px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .card-price {
            font-size: 20px;
            font-weight: 800;
            color: white;
            margin-bottom: 20px;
        }
        .card-footer {
            margin-top: auto;
            display: grid;
            gap: 10px;
        }
        .btn-card {
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(90deg, #4fd0ff, #7b5bff);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .nav-center { display: none; }
            .search-inner { flex-direction: column; padding: 12px; }
            .search-btn { width: 100%; }
            .page-container { padding-top: 20px; }
            .search-hero { margin-top: 30px; }
            .results-grid { grid-template-columns: 1fr; }
        }
    </style>
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="soft-bg has-mobile-nav">
    <div class="premium-bg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="mist-container"></div>
    </div>

    <!-- Desktop Nav (Icon Based) -->
    <nav class="nav-wrapper desktop-only" style="background: rgba(15, 19, 36, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); height: 72px; position: sticky; top: 0; z-index: 1000;">
        <div class="content-container" style="display:flex; align-items:center; justify-content:space-between; height: 100%;">
            <a href="dashboard.html" class="brand" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: white;">
                <img src="logo.png" alt="CoSwap" style="width: 32px; height: 32px;">
                <span style="font-size: 20px; font-weight: 800; letter-spacing: -0.02em;">CoSwap</span>
            </a>
            
            <div style="display: flex; gap: 32px; align-items: center;">
                <a href="dashboard.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Dashboard</a>
                <a href="browse.html" style="color: #4fd0ff; font-weight: 600; text-decoration: none;">Browse</a>
                <a href="sell.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Sell</a>
                <a href="mylistings.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">My Listings</a>
            </div>

            <div style="display: flex; gap: 12px; align-items: center;">
                <a href="chatlist.html" class="btn-icon" title="Messages"><i data-lucide="message-square"></i></a>
                <a href="profile.html" class="btn-icon" title="Profile"><i data-lucide="user"></i></a>
                <a href="login.html" class="btn-icon" title="Logout" style="color: var(--danger);"><i data-lucide="log-out"></i></a>
            </div>
        </div>
    </nav>

    <!-- Mobile Header -->
    <header class="mobile-header" style="display: none; padding: 16px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; background: rgba(15, 19, 36, 0.9); backdrop-filter: blur(20px);">
        <a href="dashboard.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: white;">
            <img src="logo.png" alt="CoSwap" style="width: 28px; height: 28px;">
            <span style="font-weight: 800; font-size: 18px;">CoSwap</span>
        </a>
        <div style="display: flex; gap: 16px; align-items: center;">
            <a href="chatlist.html" style="color: white;"><i data-lucide="message-square"></i></a>
            <a href="profile.html" style="color: white;"><i data-lucide="user"></i></a>
            <button id="menuToggle" style="background: none; border: none; color: white;"><i data-lucide="menu"></i></button>
        </div>
    </header>

    <main class="content-container" style="padding: 40px 24px 80px;">
        <header style="margin-bottom: 40px;">
            <h1 style="font-size: 36px; font-weight: 800; letter-spacing: -0.02em;">Marketplace</h1>
            <p style="color: rgba(255,255,255,0.5); margin-top: 4px;">Find premium discounted vouchers from trusted sellers.</p>
        </header>
            </div>
        </section>

        <!-- Recommendations -->
        <section>
            <div class="section-header">
                <h2>Recommended for you</h2>
            </div>
            <div id="recommendationGrid" class="results-grid">
                <div class="empty-state">Finding best deals...</div>
            </div>
        </section>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav" aria-label="Mobile navigation">
        <div class="mobile-nav-inner">
            <a href="dashboard.html" class="mobile-nav-item"><i data-lucide="layout-dashboard"></i><span>Home</span></a>
            <a href="browse.html" class="mobile-nav-item active"><i data-lucide="search"></i><span>Browse</span></a>
            <a href="sell.html" class="mobile-nav-item"><i data-lucide="plus-circle"></i><span>Sell</span></a>
            <a href="chatlist.html" class="mobile-nav-item"><i data-lucide="message-square"></i><span>Chat</span></a>
            <a class="mobile-nav-item" href="profile.html">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
            </a>
        </div>
    </nav>

    <script src="api.js"></script>
    <script>
        const searchInput = document.getElementById("searchInput");
        const grid = document.getElementById("grid");
        const recommendationGrid = document.getElementById("recommendationGrid");

        let coupons = [];
        let searchTimer = null;

        function escapeHtml(str) {
            if (!str) return "";
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function setQuery(query) {
            searchInput.value = query;
            applySearch();
        }

        function applySearch() {
            const value = searchInput.value.trim();
            loadCoupons(value);
        }

        async function loadCoupons(searchTerm = "") {
            grid.innerHTML = '<div class="empty-state">Searching marketplace...</div>';
            try {
                const query = searchTerm ? `?search=${encodeURIComponent(searchTerm)}` : "";
                const data = await apiRequest(`/coupons${query}`);
                coupons = data.coupons || [];
                renderCoupons(coupons);
            } catch (err) {
                grid.innerHTML = `<div class="empty-state">Unable to load listings. ${escapeHtml(err.message)}</div>`;
            }
        }

        function renderCoupons(items) {
            if (!items.length) {
                grid.innerHTML = '<div class="empty-state">No listings found.</div>';
                return;
            }
            grid.innerHTML = items.map((c, idx) => `
                <article class="coupon-card">
                    <img src="${escapeHtml(c.image_url || 'bg.png')}" class="card-img" onerror="this.src='bg.png'">
                    <div class="card-content">
                        <div class="card-tag">${escapeHtml(c.category || 'Deal')}</div>
                        <div class="card-title">${escapeHtml(c.title)}</div>
                        <div class="card-price">₹${escapeHtml(String(c.price))}</div>
                        <div class="card-footer">
                            <button class="btn-card btn-primary" onclick="window.location.href='buy.html?id=${c.id}'">Buy Now</button>
                            <button class="btn-card btn-secondary" onclick="window.location.href='coupon-details.html?id=${c.id}'">Details</button>
                        </div>
                    </div>
                </article>
            `).join("");
        }

        async function loadRecommendations() {
            recommendationGrid.innerHTML = '<div class="empty-state">Finding best deals...</div>';
            try {
                const data = await apiRequest("/recommendations?limit=4");
                const recs = data.recommendations || [];
                if (!recs.length) {
                    recommendationGrid.innerHTML = '<div class="empty-state">No recommendations available yet.</div>';
                    return;
                }
                recommendationGrid.innerHTML = recs.map(item => `
                    <article class="coupon-card">
                        <img src="${escapeHtml(item.image_url || 'bg.png')}" class="card-img" onerror="this.src='bg.png'">
                        <div class="card-content">
                            <div class="card-tag">Recommended</div>
                            <div class="card-title">${escapeHtml(item.title)}</div>
                            <div class="card-price">₹${escapeHtml(String(item.price))}</div>
                            <div class="card-footer">
                                <button class="btn-card btn-primary" onclick="window.location.href='buy.html?id=${item.id}'">Buy Now</button>
                            </div>
                        </div>
                    </article>
                `).join("");
            } catch (err) {
                recommendationGrid.innerHTML = '<div class="empty-state">No recommendations available yet.</div>';
            }
        }

        // Initialize
        document.addEventListener("DOMContentLoaded", () => {
            loadCoupons();
            loadRecommendations();
        });

        // Live search with debounce
        searchInput.addEventListener("input", () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(applySearch, 500);
        });
    </script>
</body>
</html>
