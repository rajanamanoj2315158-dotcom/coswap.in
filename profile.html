<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile & Settings — CoSwap</title>
    <link rel="stylesheet" href="theme.css">
    <script src="api.js"></script>
    <script src="ui.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: white; 
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        .ambient-orbs {
            position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden;
        }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(79, 208, 255, 0.1), transparent 70%); top: -100px; left: -100px; animation: orbFloat 20s infinite; }
        @keyframes orbFloat { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(30px, -20px); } }

        /* SaaS Header */
        .nav-wrapper {
            position: sticky; top: 0; z-index: 100;
            background: rgba(11, 15, 29, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; font-weight: 800; }
        .nav-left img { width: 32px; height: 32px; }
        .nav-center { display: flex; gap: 24px; }
        .nav-center a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .nav-center a:hover { color: white; }
        .nav-right { transform: scale(0.9); }

        /* Profile Layout */
        .main-container { max-width: 900px; margin: 40px auto; padding: 0 24px; }
        .header { margin-bottom: 32px; }
        .header h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
        .header p { color: rgba(255,255,255,0.5); font-size: 16px; }

        .settings-grid { display: grid; gap: 24px; }
        .settings-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 24px; backdrop-filter: blur(10px);
        }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 12px 16px; color: white; font-size: 15px;
        }
        
        .btn-save {
            background: white; color: black; border: none; padding: 12px 24px; border-radius: 8px;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,255,255,0.2); }

        .danger-zone { margin-top: 40px; border-top: 1px solid rgba(255,0,0,0.2); padding-top: 24px; }
        .btn-logout {
            background: rgba(255, 59, 48, 0.1); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.2);
            padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s;
            width: 100%; text-align: center;
        }
        .btn-logout:hover { background: rgba(255, 59, 48, 0.2); }

        @media (max-width: 768px) {
            .nav-center { display: none; }
            .header h1 { font-size: 28px; }
        }
    </style>
</head>
<body class="soft-bg">
    <div class="ambient-orbs"><div class="orb orb-1"></div></div>

    <nav class="nav-wrapper">
        <div class="nav-container">
            <a href="dashboard.html" class="nav-left">
                <img src="logo.png" alt="CoSwap">
                <span>CoSwap</span>
            </a>
            <div class="nav-center">
                <a href="dashboard.html">Dashboard</a>
                <a href="browse.html">Browse</a>
                <a href="sell.html">Sell</a>
                <a href="mylistings.html">My Listings</a>
            </div>
            <div class="nav-right">
                <a href="profile.html" class="profile-btn" style="background: rgba(255,255,255,0.15);">
                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:white;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <div class="header">
            <h1>Account Settings</h1>
            <p>Manage your profile information and account preferences.</p>
        </div>

        <div class="settings-grid">
            <div class="settings-card">
                <div class="card-title">Personal Information</div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="Loading..." readonly>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" placeholder="Loading..." readonly>
                </div>
                <button class="btn-save" onclick="alert('Profile updates are coming soon!')">Save Changes</button>
            </div>

            <div class="settings-card">
                <div class="card-title">Marketplace Activity</div>
                <p style="color:rgba(255,255,255,0.6); font-size:14px; margin-bottom:20px;">
                    Review your status and history as a member of the CoSwap marketplace.
                </p>
                <div style="display:flex; gap:12px;">
                    <a href="sellerprofile.html" style="color:#4fd0ff; text-decoration:none; font-size:14px; font-weight:600;">View Public Profile &rarr;</a>
                    <a href="mypurchases.html" style="color:#4fd0ff; text-decoration:none; font-size:14px; font-weight:600;">Purchase History &rarr;</a>
                </div>
            </div>

            <div class="danger-zone">
                <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (!requireAuth()) return;
            
            const user = getCurrentUser();
            if (user) {
                document.getElementById("userName").value = user.name || "N/A";
                document.getElementById("userEmail").value = user.email || "N/A";
            }
        });

        function handleLogout() {
            if (confirm("Are you sure you want to sign out?")) {
                clearAuth();
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
