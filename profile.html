<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings — CoSwap</title>
    <link rel="stylesheet" href="theme.css">
    <script src="api.js"></script>
    <script src="ui.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: white; 
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        .content-container { max-width: 1200px; margin: 0 auto; }

        /* Profile Layout */
        .main-content { max-width: 900px; margin: 40px auto; padding: 0 24px; }
        .header h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
        .header p { color: rgba(255,255,255,0.5); font-size: 16px; }

        .settings-grid { display: grid; gap: 24px; }
        .settings-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 24px; backdrop-filter: blur(10px);
        }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 12px 16px; color: white; font-size: 15px;
        }
        
        .btn-save {
            background: white; color: black; border: none; padding: 12px 24px; border-radius: 8px;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,255,255,0.2); }

        .danger-zone { margin-top: 40px; border-top: 1px solid rgba(255,0,0,0.2); padding-top: 24px; }
        .btn-logout {
            background: rgba(255, 59, 48, 0.1); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.2);
            padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s;
            width: 100%; text-align: center;
        }
        .btn-logout:hover { background: rgba(255, 59, 48, 0.2); }

        .btn-icon {
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.08); color: white; text-decoration: none; transition: 0.2s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.15); }
        .btn-icon i { width: 20px; height: 20px; }

        .mobile-header { display: none; }
        .has-mobile-nav .main-content { padding-bottom: 100px; } /* Space for mobile nav */

        @media (max-width: 768px) {
            .desktop-only { display: none !important; }
            .mobile-header { display: flex !important; }
            .main-content { margin-top: 20px; }
        }
    </style>
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="soft-bg has-mobile-nav">
    <div class="premium-bg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="mist-container"></div>
    </div>

    <!-- Desktop Nav (Icon Based) -->
    <nav class="nav-wrapper desktop-only" style="background: rgba(15, 19, 36, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); height: 72px; position: sticky; top: 0; z-index: 1000;">
        <div class="content-container" style="display:flex; align-items:center; justify-content:space-between; height: 100%;">
            <a href="dashboard.html" class="brand" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: white;">
                <img src="logo.png" alt="CoSwap" style="width: 32px; height: 32px;">
                <span style="font-size: 20px; font-weight: 800; letter-spacing: -0.02em;">CoSwap</span>
            </a>
            
            <div style="display: flex; gap: 32px; align-items: center;">
                <a href="dashboard.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Dashboard</a>
                <a href="browse.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Browse</a>
                <a href="sell.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">Sell</a>
                <a href="mylistings.html" style="color: rgba(255,255,255,0.7); font-weight: 600; text-decoration: none;">My Listings</a>
            </div>

            <div style="display: flex; gap: 12px; align-items: center;">
                <a href="chatlist.html" class="btn-icon" title="Messages"><i data-lucide="message-square"></i></a>
                <a href="profile.html" class="btn-icon" title="Profile" style="color: #4fd0ff; background: rgba(79, 208, 255, 0.1);"><i data-lucide="user"></i></a>
                <a href="login.html" class="btn-icon" title="Logout" style="color: var(--danger);"><i data-lucide="log-out"></i></a>
            </div>
        </div>
    </nav>

    <!-- Mobile Header -->
    <header class="mobile-header" style="display: none; padding: 16px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; background: rgba(15, 19, 36, 0.9); backdrop-filter: blur(20px);">
        <a href="dashboard.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: white;">
            <img src="logo.png" alt="CoSwap" style="width: 28px; height: 28px;">
            <span style="font-weight: 800; font-size: 18px;">CoSwap</span>
        </a>
        <div style="display: flex; gap: 16px; align-items: center;">
            <a href="chatlist.html" style="color: white;"><i data-lucide="message-square"></i></a>
            <a href="profile.html" style="color: #4fd0ff;"><i data-lucide="user"></i></a>
            <button id="menuToggle" style="background: none; border: none; color: white;"><i data-lucide="menu"></i></button>
        </div>
    </header>

    <main class="content-container main-content">
        <header style="margin-bottom: 40px;">
            <h1 style="font-size: 36px; font-weight: 800; letter-spacing: -0.02em;">Account Settings</h1>
            <p style="color: rgba(255,255,255,0.5); margin-top: 4px;">Manage your profile details and preferences.</p>
        </header>

        <div class="settings-grid">
            <div class="settings-card">
                <div class="card-title">Personal Information</div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="Loading..." readonly>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" placeholder="Loading..." readonly>
                </div>
                <button class="btn-save" onclick="alert('Profile updates are coming soon!')">Save Changes</button>
            </div>

            <div class="settings-card">
                <div class="card-title">Marketplace Activity</div>
                <p style="color:rgba(255,255,255,0.6); font-size:14px; margin-bottom:20px;">
                    Review your status and history as a member of the CoSwap marketplace.
                </p>
                <div style="display:flex; gap:12px;">
                    <a href="sellerprofile.html" style="color:#4fd0ff; text-decoration:none; font-size:14px; font-weight:600;">View Public Profile &rarr;</a>
                    <a href="mypurchases.html" style="color:#4fd0ff; text-decoration:none; font-size:14px; font-weight:600;">Purchase History &rarr;</a>
                </div>
            </div>

            <div class="danger-zone">
                <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (!requireAuth()) return;
            
            const user = getCurrentUser();
            if (user) {
                document.getElementById("userName").value = user.name || "N/A";
                document.getElementById("userEmail").value = user.email || "N/A";
            }
        });

        function handleLogout() {
            if (confirm("Are you sure you want to sign out?")) {
                clearAuth();
                window.location.href = "login.html";
            }
        }
    </script>
    <!-- Bottom Nav for Mobile -->
    <nav class="mobile-nav">
        <div class="mobile-nav-inner">
            <a href="dashboard.html" class="mobile-nav-item"><i data-lucide="layout-dashboard"></i><span>Home</span></a>
            <a href="browse.html" class="mobile-nav-item"><i data-lucide="search"></i><span>Browse</span></a>
            <a href="sell.html" class="mobile-nav-item"><i data-lucide="plus-circle"></i><span>Sell</span></a>
            <a href="chatlist.html" class="mobile-nav-item"><i data-lucide="message-square"></i><span>Chat</span></a>
        </div>
    </nav>
    <script>lucide.createIcons();</script>
