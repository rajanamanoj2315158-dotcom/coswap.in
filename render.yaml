services:
  - type: web
    name: coswap
    env: node
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_EMAIL
        value: admin@coswap.com
      - key: ADMIN_PASSWORD
        sync: false
