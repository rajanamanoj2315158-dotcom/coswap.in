services:
  - type: web
    name: coswap
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_EMAIL
        value: admin@coswap.com
      - key: ADMIN_PASSWORD
        sync: false
