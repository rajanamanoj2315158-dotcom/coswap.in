        <div id="dateError" class="error-text">Select a valid expiry date.</div>

        <!-- PRICE -->
        <label>Price (₹)*</label>
        <input id="priceInput" placeholder="Enter selling price">
        <div id="priceError" class="error-text"></div>

        <!-- CATEGORY -->
        <label>Category*</label>
        <select id="categoryInput">
            <option value="">Select Category</option>
            <option>Shopping</option>
            <option>OTT</option>
            <option>Music</option>
            <option>Food Delivery</option>
            <option>Gaming</option>
            <option>Recharge</option>
            <option>Travel</option>
            <option>Groceries</option>
            <option>Education</option>
            <option>Electronics</option>
            <option>Beauty</option>
            <option>Fashion</option>
            <option>Health</option>
            <option>Bills & Utilities</option>
        </select>
        <div id="categoryError" class="error-text">Please select a category.</div>

    <script src="api.js"></script>
    <script>
        if (!requireAuth("sell.html")) {
            // redirected
        }

        /* LOAD PROFILE METRICS */
        let sellerMaxPrice = 20;

        async function loadProfileStats() {
            try {
                const data = await apiRequest("/me/profile");
                const profile = data.profile || {};

                const fraudPercent = Number(profile.fraudPercent || 0).toFixed(1);
                sellerMaxPrice = profile.maxPrice || 20;
                const status = profile.status === "frozen" ? "Frozen" : "Active";

                document.getElementById("percent").innerText = `${fraudPercent}%`;
                document.getElementById("maxPrice").innerText = sellerMaxPrice;
                document.getElementById("statusText").innerText = status;
            } catch {
                const storedProfile = JSON.parse(localStorage.getItem("profileData"));
                sellerMaxPrice = storedProfile ? storedProfile.maxPrice : 20;
            }
            document.getElementById("maxPrice").innerText = sellerMaxPrice;
        }

        loadProfileStats();

        /* MIN DATE = TODAY */
        (function () {
            const d = new Date();
            expiryInput.min =
                `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
        })();

        /* PRICE VALIDATION */
        priceInput.addEventListener("input", () => {
            let value = priceInput.value.trim();
            let error = document.getElementById("priceError");

            if (!/^[0-9]*$/.test(value)) {
                error.innerText = "Enter a valid number.";
                error.style.display = "block";
                return;
            }

            if (!value) {
                error.style.display = "none";
                return;
            }

            if (parseInt(value) > sellerMaxPrice) {
                error.innerText = `Price cannot exceed ₹${sellerMaxPrice}.`;
                error.style.display = "block";
            } else {
                error.style.display = "none";
            }
        });

        /* SUBMIT */
        sellButton.onclick = () => {
            let title = titleInput.value.trim();
            let details = detailsInput.value.trim();
            let expiry = expiryInput.value;
            let price = priceInput.value.trim();
            let category = categoryInput.value;
            let uploadedImage = imageInput.files[0];

            let valid = true;

            if (!title) { titleError.style.display = "block"; valid = false; }
            if (!details) { detailsError.style.display = "block"; valid = false; }
            if (!expiry) { dateError.style.display = "block"; valid = false; }

            if (!/^[0-9]+$/.test(price)) {
                priceError.innerText = "Enter a valid price.";
                priceError.style.display = "block";
                valid = false;
            } else if (parseInt(price) > sellerMaxPrice) {
                priceError.innerText = `Max allowed price: ₹${sellerMaxPrice}`;
                priceError.style.display = "block";
                valid = false;
            }

            if (!category) { categoryError.style.display = "block"; valid = false; }

            if (!valid) return;

            async function saveCoupon(imageURL) {
                try {
                    await apiRequest("/coupons", {
                        method: "POST",
                        body: JSON.stringify({
                            title,
                            details,
                            expiry,
                            price,
                            category,
                            image: imageURL
                        })
                    });

                    alert("✔ Coupon Posted Successfully!");
                    window.location.href = "mylistings.html";
                } catch (err) {
                    alert(err.message || "Failed to post coupon.");
                }
            }

            if (uploadedImage) {
                const reader = new FileReader();
                reader.onload = e => saveCoupon(e.target.result);
                reader.readAsDataURL(uploadedImage);
            } else {
                saveCoupon("bg.png");
            }
        };
    </script>
