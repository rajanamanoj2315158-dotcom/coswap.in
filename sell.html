<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Coupons — CoSwap</title>
    <meta name="description" content="List your unused coupons or vouchers for sale on CoSwap India's marketplace.">
    <link rel="stylesheet" href="theme.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .sell-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        
        /* Vibrant Premium Header */
        .header-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 50%, #1d4ed8 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 70px 0;
            margin-bottom: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-gradient::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #categoryInput, #expiryInput, #priceInput {
            background: #020617 !important;
            color: #e5e7eb !important;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #expiryInput {
            cursor: pointer;
        }
    </style>
</head>

<body class="soft-bg">
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; height: 100%;">
            <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: white;">
                <img src="logo.png" alt="CoSwap" style="width: 32px; height: 32px;">
                <span style="font-size: 20px; font-weight: 800; letter-spacing: -0.04em;">CoSwap</span>
            </a>
            
            <div class="nav-menu">
                <a href="browse.html" class="nav-link">Browse</a>
                <a href="sell.html" class="nav-link active">Sell</a>
                <a href="dashboard.html" class="nav-link">My Listings</a>
                <a href="chatlist.html" class="nav-link">Messages</a>
                <a href="profile.html" class="nav-link">Profile</a>
            </div>

            <div class="nav-right">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=coswap" alt="Avatar" class="user-avatar" onclick="window.location.href='profile.html'">
            </div>
        </div>
    </nav>

    <header class="header-gradient">
        <div class="container">
            <h1 style="font-size: 48px; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 12px; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.2);">List Your Coupon</h1>
            <p style="color: rgba(255,255,255,0.9); font-size: 18px; max-width: 600px; margin: 0 auto;">Reach thousands of buyers instantly. Fast, secure, and transparent marketplace.</p>
        </div>
    </header>

    <main class="container" style="padding-bottom: 100px;">
        <div class="sell-card" style="max-width: 540px; margin: 0 auto;">
            <div style="margin-bottom: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
                <div>
                    <span style="font-size: 11px; text-transform: uppercase; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; display: block; margin-bottom: 4px;">Trust Score</span>
                    <span id="trustPercent" style="font-size: 20px; font-weight: 800; color: #38bdf8;">--%</span>
                </div>
                <div style="text-align: right;">
                    <span style="font-size: 11px; text-transform: uppercase; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; display: block; margin-bottom: 4px;">Selling Limit</span>
                    <span id="maxAllowedPrice" style="font-size: 20px; font-weight: 800; color: #38bdf8;">₹--</span>
                </div>
            </div>

            <form id="sellForm" onsubmit="handleListCoupon(event)">
                <div class="form-group">
                    <label for="titleInput">Coupon Title*</label>
                    <input type="text" id="titleInput" placeholder="e.g. Amazon Gift Card ₹1000" maxlength="120" required>
                </div>

                <div class="form-group">
                    <label for="categoryInput">Category*</label>
                    <select id="categoryInput" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="OTT">OTT</option>
                        <option value="Food">Food</option>
                        <option value="Travel">Travel</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Beauty">Beauty</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Gift Cards">Gift Cards</option>
                        <option value="Gaming">Gaming</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="priceInput">Listing Price (₹)*</label>
                    <input type="number" id="priceInput" placeholder="Min ₹1" min="1" step="1" required>
                    <span id="priceHint" style="font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 4px;">Loading limit...</span>
                </div>

                <div class="form-group">
                    <label for="expiryInput">Expiry Date*</label>
                    <input type="date" id="expiryInput" readonly required placeholder="Choose Date" onclick="this.showPicker()">
                    <span style="font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 4px;">Select from calendar only.</span>
                </div>

                <div class="form-group">
                    <label for="detailsInput">Offer Details*</label>
                    <textarea id="detailsInput" placeholder="Describe the terms, conditions, and what the buyer gets." style="min-height: 100px;" required></textarea>
                </div>

                <button type="submit" class="primary-btn" id="submitBtn" style="width: 100%; margin-top: 12px; height: 54px; font-size: 16px;">Publish Listing</button>
            </form>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script>
        lucide.createIcons();

        let userMaxPrice = 500;

        async function initPage() {
            if (!getAuthToken()) {
                window.location.href = "login.html";
                return;
            }

            // Expiry Date Hardening
            const today = new Date().toISOString().split("T")[0];
            const expiry = document.getElementById("expiryInput");
            expiry.setAttribute("min", today);
            
            // Block keyboard completely
            expiry.addEventListener("keydown", (e) => e.preventDefault());
            expiry.addEventListener("mousedown", (e) => {
                // Ensure calendar opens on click
                if (typeof expiry.showPicker === 'function') {
                    expiry.showPicker();
                }
            });

            try {
                const data = await apiRequest("/me/profile");
                const profile = data.profile || {};
                userMaxPrice = profile.maxPrice || 500;
                const fraud = profile.fraudPercent || 0;
                
                document.getElementById("trustPercent").innerText = `${100 - fraud}%`;
                document.getElementById("maxAllowedPrice").innerText = `₹${userMaxPrice}`;
                document.getElementById("priceHint").innerText = `Max allowed: ₹${userMaxPrice} (based on trust & sales)`;
            } catch (err) {
                console.error("Profile load failed", err);
                document.getElementById("priceHint").innerText = "Failed to load limits.";
            }
        }

        async function handleListCoupon(e) {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            const price = parseInt(document.getElementById("priceInput").value);

            if (price > userMaxPrice) {
                showToast(`Price cannot exceed your limit of ₹${userMaxPrice}`, "error");
                return;
            }

            const payload = {
                title: document.getElementById("titleInput").value.trim(),
                category: document.getElementById("categoryInput").value,
                price: price,
                expiry: document.getElementById("expiryInput").value,
                details: document.getElementById("detailsInput").value.trim()
            };

            try {
                btn.disabled = true;
                btn.innerText = "Publishing Listing...";
                await apiRequest("/coupons", {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                showToast("Coupon listed successfully!", "success");
                setTimeout(() => window.location.href = "mylistings.html", 1500);
            } catch (err) {
                showToast(err.message || "Failed to publish coupon", "error");
                btn.disabled = false;
                btn.innerText = "Publish Listing";
            }
        }

        initPage();
    </script>
</body>
</html>
